                /* ── FILTER/SEARCH RESULTS OVERLAY ────────────── */
                body.results-active #hot-deals-section,
                body.results-active #charts-section,
                body.results-active #hero-slider-section,
                body.results-active #hero-banner {
                    display: none !important;
                }

                /* ── SCROLL-DRIVEN HERO SLIDER ─────────────────── */
                #hero-slider-section {
                    position: relative;
                    margin-top: 60px;
                    margin-left: var(--sidebar-w);
                    width: calc(100% - var(--sidebar-w));
                    height: 480px;
                    overflow: hidden;
                    background: var(--bg-void);
                }

                /* Track: wide enough to hold all slides in a row */
                #hero-slides {
                    display: flex;
                    flex-direction: row;
                    flex-wrap: nowrap;
                    height: 100%;
                    transition: transform 0.65s cubic-bezier(0.16, 1, 0.3, 1);
                    will-change: transform;
                    /* Do NOT set width here — let it grow naturally */
                }

                /* Each slide width is set by JS (_updateHeroTrack) */
                .hero-slide {
                    position: relative;
                    height: 100%;
                    overflow: hidden;
                    flex-shrink: 0;
                    flex-grow: 0;
                }

                .hero-slide-bg {
                    position: absolute;
                    inset: 0;
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                    object-position: center 30%;
                    display: block;
                    image-rendering: auto;
                    -webkit-backface-visibility: hidden;
                    backface-visibility: hidden;
                    transform: translateZ(0);
                    filter: saturate(1.08) brightness(1.0);
                    transition: transform 9s ease-out;
                    transform-origin: center center;
                }

                .hero-slide.active .hero-slide-bg {
                    transform: scale(1.05);
                }

                .hero-slide-gradient {
                    position: absolute;
                    inset: 0;
                    background: linear-gradient(to right, rgba(5,5,8,0.97) 0%, rgba(5,5,8,0.82) 40%, rgba(5,5,8,0.25) 70%, transparent 100%), linear-gradient(to top, rgba(5,5,8,0.55) 0%, transparent 35%);
                    z-index: 1;
                }

                .hero-slide-content {
                    position: absolute;
                    inset: 0;
                    display: flex;
                    flex-direction: column;
                    justify-content: flex-end;
                    padding: 44px 52px 44px 72px;
                    max-width: 580px;
                    text-align: left;
                    align-items: flex-start;
                    z-index: 2;
                    opacity: 0;
                    transform: translateY(16px);
                    transition: opacity 0.5s 0.1s ease, transform 0.5s 0.1s ease;
                }

                .hero-slide.active .hero-slide-content {
                    opacity: 1;
                    transform: translateY(0);
                }

                .hero-slide-badge {
                    display: inline-flex;
                    align-items: center;
                    gap: 5px;
                    font-size: 0.6rem;
                    font-weight: 700;
                    letter-spacing: 2.5px;
                    text-transform: uppercase;
                    color: #fff;
                    background: rgba(255,255,255,0.15);
                    border: 1px solid rgba(255,255,255,0.25);
                    padding: 4px 12px;
                    border-radius: 100px;
                    margin-bottom: 14px;
                    width: fit-content;
                    backdrop-filter: blur(8px);
                }

                .hero-slide-title {
                    font-family: 'Orbitron', monospace;
                    font-size: 2.9rem;
                    font-weight: 800;
                    color: #fff;
                    line-height: 1.1;
                    margin-bottom: 14px;
                    text-shadow: 0 2px 32px rgba(0,0,0,0.95);
                    letter-spacing: 0.01em;
                }

                .hero-slide-desc {
                    font-size: 0.95rem;
                    color: rgba(200,216,232,0.85);
                    line-height: 1.65;
                    margin-bottom: 22px;
                    display: -webkit-box;
                    -webkit-line-clamp: 2;
                    -webkit-box-orient: vertical;
                    overflow: hidden;
                    max-width: 460px;
                }

                .hero-slide-tags {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 6px;
                    margin-bottom: 22px;
                }

                .hero-slide-tag {
                    font-size: 0.7rem;
                    padding: 3px 10px;
                    background: rgba(255,255,255,0.07);
                    border: 1px solid rgba(255,255,255,0.12);
                    border-radius: 100px;
                    color: rgba(200,216,232,0.7);
                    backdrop-filter: blur(4px);
                }

                /* Buttons row */
                .hero-slide-actions {
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    flex-wrap: wrap;
                }

                .hero-slide-btn {
                    display: inline-flex;
                    align-items: center;
                    gap: 8px;
                    background: var(--neon);
                    color: #000;
                    font-size: 0.82rem;
                    font-weight: 800;
                    padding: 12px 28px;
                    border-radius: 4px;
                    border: none;
                    cursor: pointer;
                    width: fit-content;
                    transition: background 0.15s, box-shadow 0.15s;
                    letter-spacing: 0.06em;
                    text-transform: uppercase;
                }

                    .hero-slide-btn:hover {
                        background: #00e5ff;
                        box-shadow: 0 4px 20px rgba(0,212,255,0.4);
                    }

                /* Back button — fixed inside hero section, bottom-left */


                /* Arrow controls */
                .hero-ctrl {
                    position: absolute;
                    top: 50%;
                    transform: translateY(-50%);
                    background: rgba(0,0,0,0.45);
                    border: 1px solid rgba(255,255,255,0.1);
                    color: rgba(255,255,255,0.75);
                    border-radius: 50%;
                    width: 42px;
                    height: 42px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    cursor: pointer;
                    z-index: 10;
                    transition: all 0.2s;
                    backdrop-filter: blur(8px);
                }

                    .hero-ctrl:hover {
                        background: rgba(0,212,255,0.2);
                        color: var(--neon);
                        border-color: rgba(0,212,255,0.5);
                        transform: translateY(-50%) scale(1.08);
                    }

                #hero-prev {
                    left: 16px;
                }

                #hero-next {
                    right: 16px;
                }

                /* Progress bar dots */


                .hero-lines {
                    position: absolute;
                    bottom: 20px;
                    right: 36px;
                    display: flex;
                    z-index: 10;
                    gap: 6px;
                    align-items: center;
                }

                .hero-line {
                    width: 24px;
                    height: 3px;
                    border-radius: 2px;
                    background: rgba(255,255,255,0.2);
                    cursor: pointer;
                    border: none;
                    padding: 0;
                    margin: 0;
                    transition: background 0.3s, width 0.3s;
                }

                    .hero-line.active {
                        background: var(--neon);
                        width: 38px;
                    }

                /* Scroll progress indicator */

                50% {
                    transform: translateY(4px);
                }

                }

                    #hero-slider-section {
                        height: 320px;

                    }

                    .hero-slide-content {
                        padding: 16px 18px;
                        max-width: 100%;
                        justify-content: flex-end;
                    }

                    .hero-slide-badge {
                        font-size: 0.55rem;
                        padding: 3px 10px;

                        letter-spacing: 2px;
                    }

                    .hero-slide-title {
                        font-size: 1.15rem;
                        margin-bottom: 8px;

                    .hero-slide-desc {

                    }

                    .hero-slide-tags {

                    .hero-slide-tag {
                        font-size: 0.62rem;

                    .hero-slide-gradient {

                .vp-active .hot-deal-cover,
                .vp-active .chart-thumb,

                .vp-active .vp-video {
                    opacity: 1;

                    z-index: 10;

        try {
        // Daily seed — unique 60-game batch per day from full catalog
        const dayIndex = Math.floor(Date.now() / 86400000);

        function _hdShuffle(arr, seed) {
        const a = arr.slice();
        let s = seed;
        for (let i = a.length - 1; i > 0; i--) {
        s = (s * 1664525 + 1013904223) & 0xffffffff;
        const j = Math.abs(s) % (i + 1);

        if (!CANDIDATES.length) { _renderHotDealsFallback(section, scroll); return; }

        // Step 1: ITAD ID lookup in parallel batches of 8
        const itadIds = {};
        for (let i = 0; i < CANDIDATES.length; i += 8) {
        await Promise.all(CANDIDATES.slice(i, i + 8).map(async g => {
        try {
        const res = await fetch(WORKER + '/itad-lookup?appid=' + g.steamAppId)
        .then(r => r.json()).catch(() => null);
        if (res && res.game && res.game.id) itadIds[g.id] = res.game.id;
        } catch(e) {}
        }));
        }

        const gamesWithId = CANDIDATES.filter(g => itadIds[g.id]);
        if (!gamesWithId.length) { _renderHotDealsFallback(section, scroll); return; }

        // Step 2: Batch price lookup
        const pricesRaw = await fetch(WORKER + '/itad-prices', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(gamesWithId.map(g => itadIds[g.id]))
        }).then(r => r.json()).catch(() => []);

        }

        const withDeals = [];

        const priceData = priceMap[itadIds[g.id]];

        const validDeals = (priceData.deals || []).filter(d => {
        const cut   = d.cut || 0;
        const final = (d.price   && d.price.amount)   || 0;
        const orig  = (d.regular && d.regular.amount) || 0;
        return cut > 0 && orig > 0 && final > 0 && final < orig;
        });
        if (!validDeals.length) return;

        validDeals.sort((a, b) => b.cut - a.cut);
        const best       = validDeals[0];
        const finalPrice = best.price.amount;
        const origPrice  = best.regular.amount;
        if (finalPrice >= origPrice) return;

        withDeals.push({
        cut:          best.cut,
        price:        finalPrice,
        regular:      origPrice,
        shop:         (best.shop && best.shop.name) || 'Steam',
        dealUrl:      best.url || null,
        id:           g.id,
        title:        g.title,
        cover:        g.cover,
        steamAppId:   g.steamAppId ? String(g.steamAppId) : '',
        movies:       g.movies || [],
        trailer:      g.trailer || '',
        storeLinks:   g.storeLinks || {},
        description:  g.description || '',
        tags:         g.userTags || g.genres || [],
        rating:       g.rating || '',
        popularity:   g.popularity || 0,
        sponsored:    !!(g.sponsored || g.latestFeatured),
        originalPrice: origPrice,
        releaseDate:  g.createdAt || 0,
        computed: { hasDeal: true, bestCut: best.cut, bestPrice: finalPrice, bestOrig: origPrice },
        });
        });

        ((b.popularity||0)    - (a.popularity||0)) ||
        ((b.originalPrice||0) - (a.originalPrice||0)) ||

        const pageSize = isFirst ? _SB_PAGE_FIRST : _SB_PAGE_BG;
        if (isFirst) console.log('[GameScout] Fetching from Supabase, range 0-' + (pageSize-1));

        if (isFirst) console.log('[GameScout] Fetching rows ' + offset + '-' + (offset+pageSize-1));

        const batch = (data || []).map(row => _sbRowToGame(row)).filter(Boolean);
        if (isFirst) {
        if (!batch.length) { loadSampleData(); return; }

        // Full Firebase load — used as Supabase fallback
        function _loadFromFirebase() {
        if (!db) {

        if (db) { _loadFromFirebase(); }

        console.log('[GameScout] Loading from Firebase RTDB...');

        db.ref('games').orderByKey().limitToFirst(2000).once('value').then(snap => {
        const data = snap.val();
        if (!data) { loadSampleData(); return; }
        const entries = Object.entries(data);
        allGames = entries.map(([id,g]) => ({...g, id: g.id || id})).filter(g => g.status !== 'draft');
        // Store last Firebase key (not game id) for cursor
        const lastFbKey = entries[entries.length - 1]?.[0];
        postLoad();
        if (lastFbKey) {
        setTimeout(() => _loadFirebaseChunk(lastFbKey), 400);
        } else {
        _allGamesLoaded = true;

        console.error('[GameScout] Firebase load failed:', e.message);

        function _loadFirebaseChunk(afterKey) {
        if (!db) return;
        const CHUNK = 3000;
        db.ref('games').orderByKey().startAfter(afterKey).limitToFirst(CHUNK).once('value').then(snap => {
        const data = snap.val();
        if (!data) { _allGamesLoaded = true; _fbBgUpdate(); return; }
        const entries = Object.entries(data);
        for (let i = 0; i < entries.length; i++) {
        const [fbKey, g] = entries[i];
        if (g.status === 'draft') continue;
        allGames.push({...g, id: g.id || fbKey});
        }
        _fbBgUpdate();
        const newLastFbKey = entries[entries.length - 1]?.[0];
        console.log('[GameScout] Loaded chunk, total:', allGames.length, 'lastKey:', newLastFbKey);
        if (entries.length === CHUNK && newLastFbKey) {
        setTimeout(() => _loadFirebaseChunk(newLastFbKey), 300);
        } else {
        _allGamesLoaded = true;
        console.log('[GameScout] All games loaded:', allGames.length);
        requestAnimationFrame(() => {
        buildFilterOptions(); buildFilterSections();
        applyFilters();
        const n = allGames.filter(g => g.status !== 'draft').length;
        const el = document.getElementById('total-count');

        _trCache = null;
        renderTopRatedChart();
        if (!window._hotDealsData || !window._hotDealsData[0]?.cut) loadHotDeals();

        // ════════════════════════════════════════════════════════════
        //  VIDEO PREVIEW ENGINE

        //  One video at a time. Lazy src. Desktop hover + Mobile tap.
        // ════════════════════════════════════════════════════════════
        // ════════════════════════════════════════════════════════════
        //  VIDEO PREVIEW ENGINE — event delegation, lazy load, one video
        // ════════════════════════════════════════════════════════════
        let _vpActive = null; // { video, wrap }
        let _vpHoverTimer = null;
        let _vpStopTimer = null;

        // Validate: only mp4/webm URLs work in <video>
        function _vpValidSrc(url) {
        if (!url) return null;
        if (url.includes('.mp4') || url.includes('.webm') || url.includes('.m3u8')) return url;
        return null;
        }

        function _vpStopAll() {
        clearTimeout(_vpHoverTimer);
        clearTimeout(_vpStopTimer);
        if (!_vpActive) return;
        const { video, iframe, wrap, hls } = _vpActive;
        if (video) {
        video.pause();
        video.currentTime = 0;
        if (hls) { hls.destroy(); delete video._hls; }
        }
        if (iframe) {
        iframe.src = '';
        iframe.removeAttribute('src');
        }
        wrap.classList.remove('vp-active');
        // Restore overlay and description
        const _stopCard = wrap.closest ? wrap.closest('.game-card') : null;
        if (_stopCard) {
        const _ov = _stopCard.querySelector('.card-hover-overlay');
        const _de = _stopCard.querySelector('.overlay-desc');
        if (_ov) _ov.style.removeProperty('display');
        if (_de) _de.style.removeProperty('display');
        }
        _vpActive = null;
        }

        function _vpStartYt(wrap, iframe) {
        if (_vpActive && _vpActive.iframe === iframe) return;
        _vpStopAll();
        const ytId = iframe.dataset.yt;
        if (!ytId) return;
        _vpActive = { video: null, iframe, wrap, hls: null };
        iframe.allow = 'autoplay; encrypted-media';
        iframe.src = 'https://www.youtube.com/embed/' + ytId +
        '?autoplay=1&mute=1&loop=1&playlist=' + ytId +
        '&controls=0&rel=0&modestbranding=1&playsinline=1&enablejsapi=0';
        wrap.classList.add('vp-active');

        const _ytCard = wrap.closest ? wrap.closest('.game-card') : null;
        if (_ytCard) {
        const _ov = _ytCard.querySelector('.card-hover-overlay');
        const _de = _ytCard.querySelector('.overlay-desc');
        if (_ov) _ov.style.display = 'none';
        if (_de) _de.style.display = 'none';
        }

        function _vpStart(wrap, video) {
        if (_vpActive && _vpActive.video === video) return;
        _vpStopAll();

        const src = _vpValidSrc(video.dataset.src);
        if (!src) return;

        let hlsInst = null;

        video.muted    = true;
        video.autoplay = true;
        video.loop     = true;

        function onReady() {
        if (!_vpActive || _vpActive.video !== video) return;
        video.currentTime = 0;
        const p = video.play();
        if (p && p.catch) p.catch(() => {
        // play() rejected — still show vp-active (muted video may still render)
        });

        // Hide overlay and description
        const _rdCard = wrap.closest ? wrap.closest('.game-card') : null;
        if (_rdCard) {
        const _ov = _rdCard.querySelector('.card-hover-overlay');
        const _de = _rdCard.querySelector('.overlay-desc');
        if (_ov) _ov.style.display = 'none';
        if (_de) _de.style.display = 'none';
        }
        }

        const isHls = src.includes('.m3u8');

        if (isHls && typeof Hls !== 'undefined' && Hls.isSupported()) {
        if (video._hls) { video._hls.destroy(); delete video._hls; }
        hlsInst = new Hls({ maxBufferLength: 8, maxMaxBufferLength: 16, enableWorker: false });
        hlsInst.loadSource(src);
        hlsInst.attachMedia(video);
        video._hls = hlsInst;
        _vpActive = { video, iframe: null, wrap, hls: hlsInst };
        hlsInst.on(Hls.Events.MANIFEST_PARSED, onReady);

        } else {
        if (!video.src || video.src !== src) {
        video.src = src;

        _vpActive = { video, iframe: null, wrap, hls: null };
        if (video.readyState >= 3) {
        onReady();
        } else {
        video.addEventListener('loadeddata', onReady, { once: true });
        // error: only stop if it's a chart/deal card — for game-card stop immediately
        video.addEventListener('error', function() {
        if (!_vpActive || _vpActive.video !== video) return;
        const isChartOrDeal = wrap.classList.contains('chart-thumb-wrap') || wrap.classList.contains('hot-deal-cover-wrap');
        if (!isChartOrDeal) { _vpStopAll(); return; }
        // For chart/deal: try showing vp-active even if video errors (cover was already replaced)
        // Just stop video tracking but keep wrap state clean
        _vpActive = null;
        }, { once: true });
        }
        }
        }

        // ── Event delegation — works for all dynamically rendered cards ──────────
        const _isMobVP = () => window.matchMedia('(hover: none) and (pointer: coarse)').matches;

        // DESKTOP: hover — 0ms delay, instant
        document.addEventListener('mouseover', e => {

        if (card) wrap = card.querySelector('.chart-thumb-wrap, .hot-deal-cover-wrap');
        }
        if (!wrap) return;

        const video = wrap.querySelector('.vp-video');

        document.addEventListener('mouseout', e => {
        if (_isMobVP()) return;

        const card = e.target.closest('.chart-row, .hot-deal-card');

        const card = wrap.closest('.chart-row, .hot-deal-card, .game-card');

        if (wrap.contains(e.relatedTarget)) return;
        clearTimeout(_vpHoverTimer);

        const _stopWrap = wrap;

        if (_vpActive && _vpActive.wrap === _stopWrap) _vpStopAll();
        }, 80);
        });

        // MOBILE: tap
        document.addEventListener('click', e => {
        if (!_isMobVP()) {
        const wrap = e.target.closest('.hot-deal-cover-wrap, .chart-thumb-wrap, .card-cover-wrap');
        if (!wrap && _vpActive) _vpStopAll();
        return;
        }
        const wrap = e.target.closest('.hot-deal-cover-wrap, .chart-thumb-wrap, .card-cover-wrap');
        if (!wrap) { _vpStopAll(); return; }

        const video = wrap.querySelector('.vp-video');
        if (video && _vpValidSrc(video.dataset.src)) {
        if (_vpActive && _vpActive.wrap === wrap) { _vpStopAll(); }
        else { e.stopPropagation(); _vpStart(wrap, video); }

        }

        function postLoad() {

        buildFilterOptions();
        buildFilterSections();
        applyFilters();
        // results-info hidden by default — applyFilters controls visibility
        requestAnimationFrame(() => {
        buildHeroSlider(allGames);
        requestAnimationFrame(() => {
        loadHotDeals();
        renderTopRatedChart();
        setTimeout(injectGameListSchema, 3000);
        });
        });
        }

        /* ============================================================
        SEO — Dynamic JSON-LD
        ============================================================ */
        function injectGameListSchema() {
        const published = allGames.filter(g => g.status !== "draft").slice(0, 50);
        const schema = {
        "@context": "https://schema.org",
        "@type": "ItemList",
        "name": "GameScout — Top PC Games",
        "description": "Curated list of top-rated PC games with deals and filters",
        "url": "https://gamescout.pages.dev/",
        "numberOfItems": published.length,
        "itemListElement": published.map((g, i) => ({
        "@type": "ListItem",
        "position": i + 1,
        "item": {
        "@type": "VideoGame",
        "name": g.title,
        "description": g.description || "",
        "image": g.cover || "",
        "url": "https://gamescout.pages.dev/og?id=" + g.id,
        "gamePlatform": g.platforms || ["PC"],
        "genre": g.genres || [],
        "applicationCategory": "Game",
        "offers": g.price ? { "@type": "Offer", "price": g.price.replace(/[^0-9.]/g, "") || "0", "priceCurrency": "USD", "availability": "https://schema.org/InStock" } : undefined
        }
        }))
        };
        const el = document.getElementById("ld-gamelist");
        if (el) el.textContent = JSON.stringify(schema);
        }

        /* ============================================================
        FILTER OPTIONS
        ============================================================ */
        function buildFilterOptions() {
        if (TAXONOMY._customKeys) {
        Object.entries(TAXONOMY._customKeys).forEach(([key, label]) => {
        if (!FILTER_DEFS.find(d => d.key === key)) FILTER_DEFS.push({ key, label, svg: SVG.userTags, field: key, multi: true });
        });
        }
        filterOptionsCache = {};
        const hidden = (TAXONOMY._hidden) || {};
        FILTER_DEFS.forEach(def => {
        // If entire card is hidden in admin, exclude from filters completely
        if (hidden['_card_' + def.key]) {
        filterOptionsCache[def.key] = [];
        return;
        }
        const all = TAXONOMY[def.key] || [];
        const hiddenForKey = hidden[def.key] || [];
        filterOptionsCache[def.key] = all.filter(item => !hiddenForKey.includes(item));
        });
        }

        /* ============================================================
        FILTER SIDEBAR
        ============================================================ */
        function buildFilterSections() {
        const container = document.getElementById("filter-sections-container");
        container.innerHTML = "";
        FILTER_DEFS.forEach(def => {
        const opts = filterOptionsCache[def.key] || [];
        const isPriceUI = def.customUI && def.key === 'price';
        if (!opts.length && !isPriceUI) return;
        const section = document.createElement("div");
        section.className = "filter-section" + (def.key === "rating" ? "" : " collapsed");
        section.id = "fs-" + def.key;
        const activeSet = activeFilters[def.key] || new Set();
        const chevron = '<svg class="filter-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
        const ratingTip = def.key === "rating" ? '<div class="rating-tip"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>GameScout prioritizes <strong>Overwhelmingly Positive</strong> &amp; <strong>Very Positive</strong> — with limited <strong>Positive</strong> results — to surface only the most trusted games on official stores like Steam, GOG &amp; Epic.</span></div>' : '';
        const hasBadge = activeSet.size > 0 ? '<span class="filter-count-badge" style="background:var(--neon);color:var(--bg-void);border-radius:100px;padding:1px 6px;font-size:0.65rem;font-weight:700;">' + activeSet.size + '</span>' : '';
        const priceActive = window._priceFrom || window._priceTo;
        const priceBadge = (isPriceUI && priceActive) ? '<span class="filter-count-badge" style="background:var(--neon);color:var(--bg-void);border-radius:100px;padding:1px 6px;font-size:0.65rem;font-weight:700;">✓</span>' : '';
        const bodyContent = isPriceUI
        ? '<div style="padding:4px 0 6px;">'
        + '<div class="price-range-wrap">'
        + '<input type="number" id="price-from" placeholder="0" min="0" value="' + (window._priceFrom || '') + '" oninput="applyPriceFilter()" style="text-align:center;">'
        + '<span class="price-range-sep">→</span>'
        + '<input type="number" id="price-to" placeholder="Any" min="0" value="' + (window._priceTo || '') + '" oninput="applyPriceFilter()" style="text-align:center;">'
        + '</div>'
        + '<div class="price-active-badge" id="price-active-badge" style="display:' + (priceActive ? 'block' : 'none') + ';">'
        + (priceActive ? ('$' + (window._priceFrom || '0') + ' → ' + (window._priceTo ? '$' + window._priceTo : 'max')) : '') + '</div>'
        + '<button class="price-apply-btn" onclick="clearPriceFilter()">Clear Price Filter</button>'
        + '</div>'
        : '<div class="filter-chips" id="chips-' + def.key + '">' + opts.map(opt => '<span class="filter-chip ' + (activeSet.has(opt) ? 'active' : '') + '" onclick="toggleFilter(\'' + def.key + '\',\'' + opt.replace(/'/g, "\\'") + '\')" data-key="' + def.key + '" data-val="' + opt.replace(/"/g,'&quot;') + '">' + opt + '</span>').join("") + '</div>';
        const ratingInfoIcon = def.key === 'rating'
        ? '<span class="rating-info-wrap"><svg class="rating-info-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div class="rating-tooltip">GameScout prioritizes <strong>Overwhelmingly Positive</strong> &amp; <strong>Very Positive</strong> — with limited <strong>Positive</strong> results — to surface only the most trusted games on official stores like Steam, GOG &amp; Epic.</div></span>'
        : '';
        section.innerHTML = '<div class="filter-section-header" onclick="toggleSection(\'' + def.key + '\')"><span class="filter-section-name"><span class="filter-icon">' + def.svg + '</span>' + def.label + (isPriceUI ? priceBadge : hasBadge) + ratingInfoIcon + '</span>' + chevron + '</div><div class="filter-section-body">' + bodyContent + '</div>';
        container.appendChild(section);
        });
        }

        function toggleSection(key) { document.getElementById("fs-" + key) && document.getElementById("fs-" + key).classList.toggle("collapsed"); }

        function toggleFilter(key, value, _showToast=false) {
        if (!activeFilters[key]) activeFilters[key] = new Set();
        const set = activeFilters[key];
        const wasActive = set.has(value);
        if (wasActive) {
        set.delete(value);
        filterOrder = filterOrder.filter(f => !(f.key === key && f.value === value));
        } else {
        set.add(value);
        filterOrder.push({ key, value });
        }
        if (!set.size) delete activeFilters[key];
        currentPage = 1;
        applyFilters(); updateFilterChips(key); updateActiveFilterPills(); updateResetBtn(); updateActiveFilterCount();
        const hasActive = Object.keys(activeFilters).length > 0;
        setSectionsVisibility(hasActive || searchQuery.trim().length > 0);
        if (_showToast && !wasActive) {
        const count = filteredGames ? filteredGames.length : 0;
        showTagToast(value, count);
        }
        }

        function updateFilterChips(key) {
        const chipsEl = document.getElementById("chips-" + key); if (!chipsEl) return;
        const activeSet = activeFilters[key] || new Set();
        chipsEl.querySelectorAll(".filter-chip").forEach(chip => { chip.classList.toggle("active", activeSet.has(chip.textContent.trim())); });
        const section = document.getElementById("fs-" + key); if (!section) return;
        const existing = section.querySelector(".filter-count-badge");
        if (activeSet.size > 0) {
        if (existing) { existing.textContent = activeSet.size; }
        else { const badge = document.createElement("span"); badge.className = "filter-count-badge"; badge.style.cssText = "background:var(--neon);color:var(--bg-void);border-radius:100px;padding:1px 6px;font-size:0.65rem;font-weight:700;"; badge.textContent = activeSet.size; section.querySelector(".filter-section-name").appendChild(badge); }
        } else if (existing) { existing.remove(); }
        }

        let currentView = "grid";

        function setView(v) {
        currentView = v;
        const grid = document.getElementById("games-grid");
        grid.classList.toggle("list-view", v === "list");
        document.getElementById("btn-grid").classList.toggle("active", v === "grid");
        document.getElementById("btn-list").classList.toggle("active", v === "list");
        renderGrid();
        }

        function toggleOpt(key) {
        toggleOpts[key] = !toggleOpts[key];
        document.getElementById("tog-" + key).classList.toggle("on", toggleOpts[key]);
        currentPage = 1; applyFilters(); updateResetBtn();
        }

        function getPriceVal(p) {
        if (!p) return null;
        const s = p.toLowerCase().trim();
        if (s === "free" || s === "$0") return 0;
        const m = s.match(/[\d.]+/); return m ? parseFloat(m[0]) : null;
        }
        function matchesPriceRange(game, range) {
        const v = getPriceVal(game.price);
        if (v === null) return false;
        if (range === "Free") return v === 0;
        if (range === "Under $10") return v > 0 && v < 10;
        if (range === "$10-$20") return v >= 10 && v <= 20;
        if (range === "$20-$40") return v > 20 && v <= 40;
        if (range === "$40-$60") return v > 40 && v <= 60;
        if (range === "$60+") return v > 60;
        return false;
        }

        function applyPriceFilter() {
        var fromEl = document.getElementById('price-from');
        var toEl   = document.getElementById('price-to');
        var from = fromEl && fromEl.value !== '' ? parseFloat(fromEl.value) : null;
        var to   = toEl   && toEl.value   !== '' ? parseFloat(toEl.value)   : null;
        window._priceFrom = from;
        window._priceTo   = to;
        // Update badge
        var badge = document.getElementById('price-active-badge');
        if (badge) {
        var active = (from !== null) || (to !== null);
        badge.style.display = active ? 'block' : 'none';
        badge.textContent = '$' + (from !== null ? from : '0') + ' → ' + (to !== null ? '$' + to : 'max');
        }
        applyFilters(); renderFilterSections();
        }

        function clearPriceFilter() {
        window._priceFrom = null; window._priceTo = null;
        applyFilters(); renderFilterSections();
        }

        function _gameMatchesFilter(game, key, value) {
        const def = FILTER_DEFS.find(d => d.key === key);
        if (!def) return false;
        if (key === 'price') return matchesPriceRange(game, value);
        const gv = game[def.field];
        if (Array.isArray(gv)) return gv.includes(value);
        if (gv !== undefined) return gv === value;
        // Field not found in game — check userTags as universal fallback only
        const ut = game.userTags;
        return Array.isArray(ut) && ut.includes(value);
        }

        function _gamePassesBaseFilters(game, q) {
        if (game.status === 'draft') return false;
        if (toggleOpts.hideEarlyAccess && game.earlyAccess) return false;
        if (toggleOpts.hideLowRated && (game.rating === 'Negative' || game.rating === 'Mixed')) return false;
        if (q) {
        const h = [game.title, ...(game.genres||[]), ...(game.themes||[]), game.description||''].join(' ').toLowerCase();
        if (!h.includes(q)) return false;
        }
        if (window._priceFrom != null || window._priceTo != null) {
        const pv = getPriceVal(game.price);
        if (pv === null) return false;
        if (window._priceFrom != null && pv < window._priceFrom) return false;
        if (window._priceTo   != null && pv > window._priceTo)   return false;
        }
        return true;
        }

        function applyFilters() {
        const q = searchQuery.toLowerCase();
        const pub = allGames.filter(g => _gamePassesBaseFilters(g, q));

        const sortFns = {
        newest_added: (a,b) => { const ta=a.createdAt||0,tb=b.createdAt||0; if(tb!==ta)return tb-ta; return (b.id||'').localeCompare(a.id||''); },
        popularity:   (a,b) => (b.popularity||0)-(a.popularity||0),
        rating:       (a,b) => { const diff=(b.popularity||0)-(a.popularity||0); if(diff!==0)return diff; const ord=['Overwhelmingly Positive','Very Positive','Positive','Mixed','Negative']; return ord.indexOf(a.rating)-ord.indexOf(b.rating); },
        newest:       (a,b) => ['2024-2025','2022-2023','2019-2021','2015-2018','Before 2015'].indexOf(a.period)-['2024-2025','2022-2023','2019-2021','2015-2018','Before 2015'].indexOf(b.period),
        alpha:        (a,b) => (a.title||'').localeCompare(b.title||'')
        };

        if (filterOrder.length === 0) {
        // No filters — show all, sorted
        filteredGames = [...pub];
        filterTagCounts = {};
        if (sortFns[activeSort]) filteredGames.sort(sortFns[activeSort]);
        } else {
        // STRICT AND logic: every selected filter must match
        // Result ALWAYS decreases or stays same when adding a filter
        filteredGames = pub.filter(g =>
        filterOrder.every(({key, value}) => _gameMatchesFilter(g, key, value))
        );

        // Sort filtered results
        if (sortFns[activeSort]) filteredGames.sort(sortFns[activeSort]);

        // Per-tag counts (how many results each active tag has within current filtered set)
        filterTagCounts = {};
        filterOrder.forEach(({key, value}) => {
        filterTagCounts[key+':'+value] = filteredGames.filter(g => _gameMatchesFilter(g, key, value)).length;
        });
        }

        const _filtered = filteredGames.length;
        const _total    = allGames.filter(g => g.status !== 'draft').length;
        const _hasFilter= filterOrder.length > 0 || searchQuery.trim().length > 0;

        // results-info hidden permanently — count display removed
        document.getElementById("result-count").textContent = _filtered.toLocaleString();

        const _lblEl = document.getElementById("result-label");
        const _tagEl = document.getElementById("result-tag");
        if (_lblEl) _lblEl.textContent = _hasFilter ? `of ${_total.toLocaleString()} games` : "games";
        if (_tagEl) {
        if (searchQuery.trim()) {
        _tagEl.textContent = `"${searchQuery.trim()}"`;
        _tagEl.style.display = 'inline';
        } else if (filterOrder.length === 1) {
        _tagEl.textContent = filterOrder[0].value;
        _tagEl.style.display = 'inline';
        } else if (filterOrder.length > 1) {
        // Show AND logic label
        _tagEl.textContent = filterOrder.map(f => f.value).join(' + ');
        _tagEl.style.display = 'inline';
        } else {
        _tagEl.style.display = 'none';
        }
        }
        renderGrid(); renderPagination();
        }

        /* ============================================================
        SEARCH
        ============================================================ */
        function setSectionsVisibility(hasQuery) {
        if (hasQuery) document.body.classList.add('results-active');
        else document.body.classList.remove('results-active');
        }

        document.getElementById("search-input").addEventListener("input", e => {
        const v = e.target.value;
        document.getElementById("search-clear").style.display = v ? "block" : "none";
        clearTimeout(searchDebounceTimer);
        searchDebounceTimer = setTimeout(() => {
        searchQuery = v; currentPage = 1;
        applyFilters(); renderSuggestions(v); updateResetBtn();
        setSectionsVisibility(v.trim().length > 0);
        }, 150);
        });
        document.getElementById("search-input").addEventListener("blur", () => { setTimeout(() => { document.getElementById("suggestions-dropdown").style.display = "none"; }, 200); });

        function clearSearch() {
        document.getElementById("search-input").value = "";
        document.getElementById("search-clear").style.display = "none";
        document.getElementById("suggestions-dropdown").style.display = "none";
        searchQuery = ""; currentPage = 1; applyFilters(); updateResetBtn();
        setSectionsVisibility(false);
        document.body.classList.remove("results-active");
        }

        function positionDropdown() {
        const inp = document.getElementById("search-input");
        const dd  = document.getElementById("suggestions-dropdown");
        const r   = inp.getBoundingClientRect();
        dd.style.top   = (r.bottom + 6) + "px";
        dd.style.left  = r.left + "px";
        dd.style.width = r.width + "px";
        }
        function renderSuggestions(q) {
        const dd = document.getElementById("suggestions-dropdown");
        if (!q || q.length < 2) { dd.style.display = "none"; return; }
        const matches = allGames.filter(g => g.status !== "draft" && g.title.toLowerCase().includes(q.toLowerCase())).slice(0, 6);
        if (!matches.length) { dd.style.display = "none"; return; }
        dd.innerHTML = matches.map(g => '<div class="suggestion-item" onclick="selectSuggestion(\'' + g.title.replace(/'/g, "\\'") + '\')"><img class="suggestion-thumb" src="' + (g.cover || '') + '" alt="" loading="lazy" onerror="this.style.display=\'none\'"><div><div>' + g.title + '</div><div class="suggestion-meta">' + (g.genres || []).join(", ") + '</div></div></div>').join("");
        positionDropdown();
        dd.style.display = "block";
        }
        window.addEventListener("resize", () => { const dd = document.getElementById("suggestions-dropdown"); if (dd.style.display !== "none") positionDropdown(); });
        function selectSuggestion(title) {
        document.getElementById("search-input").value = title;
        document.getElementById("search-clear").style.display = "block";
        document.getElementById("suggestions-dropdown").style.display = "none";
        searchQuery = title; currentPage = 1; applyFilters();
        }

        /* ============================================================
        SORT
        ============================================================ */
        document.getElementById("sort-buttons").addEventListener("click", e => {
        const btn = e.target.closest(".sort-btn"); if (!btn) return;
        document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active"); activeSort = btn.dataset.sort; currentPage = 1; applyFilters();
        });

        /* ============================================================
        RENDER GRID
        ============================================================ */
        function renderGrid() {
        const grid = document.getElementById("games-grid");
        const start = (currentPage - 1) * PAGE_SIZE;
        const pageGames = filteredGames.slice(start, start + PAGE_SIZE);
        if (!filteredGames.length) {
        grid.innerHTML = '<div style="grid-column:1/-1;display:flex;flex-direction:column;align-items:center;padding:80px 20px;text-align:center;width:100%;"><div style="font-size:3rem;opacity:0.3;margin-bottom:16px;">🔍</div><div style="font-family:\'Orbitron\',monospace;color:var(--text-secondary);margin-bottom:8px;">No games found</div><div style="font-size:0.85rem;color:var(--text-muted);">Try adjusting your filters</div></div>';
        return;
        }
        grid.innerHTML = "";
        pageGames.forEach((game, i) => { grid.appendChild(buildGameCard(game, i)); });
        }

        function buildGameCard(game, idx) {
        const card = document.createElement("div");
        card.className = "game-card " + (game.sponsored ? 'sponsored' : '');
        if (currentView === "grid") card.style.animationDelay = Math.min(idx * 25, 300) + "ms";

        const ratingClass = { "Overwhelmingly Positive":"rating-overwhelmingly", "Very Positive":"rating-very", "Positive":"rating-positive", "Mixed":"rating-mixed", "Negative":"rating-negative" }[game.rating] || "";
        const popularityNum = game.popularity != null ? game.popularity : null;
        const ratingFallback = { "Overwhelmingly Positive":"99", "Very Positive":"90", "Positive":"75", "Mixed":"50", "Negative":"25" }[game.rating] || "";
        const badgeNum = popularityNum !== null ? popularityNum : ratingFallback;
        const badgeLabel = badgeNum ? badgeNum + "% ★" : "";
        const priceDisplay = (!game.price || game.price === "0" || game.price.toLowerCase() === "free") ? "Free" : game.price;
        const isFree = priceDisplay === "Free";

        // ── Video source resolution (main grid cards) ────────────────────────
        // Priority: movies[] CDN → trailer mp4/m3u8 → Steam CDN (steamAppId) → YouTube → none
        const _gcMovieSrc = (function(movies) {
        if (!movies || !movies.length) return '';
        const mv = movies[0];
        return mv.hls_h264 ||
        (mv.mp4 && (mv.mp4['480'] || mv.mp4.max)) ||
        (mv.webm && (mv.webm['480'] || mv.webm.max)) || '';
        })(game.movies);

        const _gcTrailerMp4 = (function(t) {
        if (!t) return '';
        if (t.includes('.mp4') || t.includes('.webm') || t.includes('.m3u8')) return t;
        return '';
        })(game.trailer);

        // Steam CDN fallback removed — blocked by browser CORS
        const _gcSteamSrc = '';

        const _gcYtId = (function(t) {
        if (!t) return '';
        if (!t.includes('youtube') && !t.includes('youtu.be')) return '';
        const m1 = t.match(/[?&]v=([^&]+)/);
        const m2 = t.match(/youtu\.be\/([^?&]+)/);
        const m3 = t.match(/embed\/([^?&]+)/);
        return (m1 && m1[1]) || (m2 && m2[1]) || (m3 && m3[1]) || '';
        })(game.trailer);

        const _gcVpSrc  = _gcMovieSrc || _gcTrailerMp4 || _gcSteamSrc;
        const _gcVideoHtml = _gcVpSrc
        ? '<video class="vp-video" muted loop playsinline preload="none" data-src="' + _gcVpSrc.replace(/"/g,'') + '"></video>'
        : _gcYtId
        ? '<iframe class="vp-iframe" data-yt="' + _gcYtId + '" src="" allow="autoplay; encrypted-media" allowfullscreen tabindex="-1"></iframe>'
        : '';
        const coverHTML = '<div class="card-cover-wrap"><img class="card-cover" src="' + (game.cover || '') + '" alt="' + game.title + '" loading="lazy" onerror="_imgFallback(this)">' +
        _gcVideoHtml +
        ((game.rating && badgeLabel) ? '<div class="card-rating ' + ratingClass + '" style="cursor:pointer;" onclick="event.stopPropagation();applyBadgeFilter(\'rating\',\'' + game.rating.replace(/'/g, "\\'") + '\')">' + badgeLabel + '</div>' : '') +
        (game.earlyAccess ? '<div class="ea-badge">Early Access</div>' : '') +
        (currentView === "grid" ? '<div class="card-hover-overlay"><p class="overlay-desc">' + (game.description || '') + '</p></div>' : '') +
        '</div>';

        if (currentView === "list") {
        const ratingColor = { "Overwhelmingly Positive":"#66c0f4", "Very Positive":"#66c0f4", "Positive":"#a4d157", "Mixed":"#e6a21b", "Negative":"#e84c4c" }[game.rating] || "var(--text-muted)";
        card.innerHTML = (game.sponsored ? '<div class="sponsored-badge">Sponsored</div>' : '') + coverHTML +
        '<div class="card-body"><div class="list-main"><div class="list-title">' + game.title + '</div>' +
        '<div class="list-desc">' + (game.description || '').slice(0, 180) + (game.description && game.description.length > 180 ? '…' : '') + '</div>' +
        '<div class="list-tags">' +
        (game.genres || []).slice(0, 3).map(t => '<span class="list-tag list-tag-genre" onclick="event.stopPropagation();applyBadgeFilter(\'genres\',\'' + t.replace(/'/g, "\\'") + '\')">' + '<span class="list-tag-icon">' + SVG.genres + '</span>' + t + '</span>').join('') +
        (game.platforms || []).slice(0, 2).map(t => '<span class="list-tag list-tag-platform" onclick="event.stopPropagation();applyBadgeFilter(\'platforms\',\'' + t.replace(/'/g, "\\'") + '\')">' + '<span class="list-tag-icon">' + SVG.platforms + '</span>' + t + '</span>').join('') +
        (game.themes || []).slice(0, 1).map(t => '<span class="list-tag list-tag-theme" onclick="event.stopPropagation();applyBadgeFilter(\'themes\',\'' + t.replace(/'/g, "\\'") + '\')">' + '<span class="list-tag-icon">' + SVG.themes + '</span>' + t + '</span>').join('') +
        '</div></div>' +
        '<div class="list-right"><div class="list-bottom">' +
        (game.rating ? '<div class="list-rating" style="color:' + ratingColor + ';cursor:pointer;" data-r="' + game.rating.replace(/"/g,'&quot;') + '" onclick="event.stopPropagation();applyBadgeFilter(\'rating\',this.dataset.r)">' + game.rating + '</div>' : '') +
        '<div class="card-price ' + (isFree ? 'free' : '') + '">' + priceDisplay + '</div>' +
        '<div class="card-actions"><button class="card-btn btn-main" onclick="event.stopPropagation();openModal(\'' + game.id + '\')">Details &amp; Deals</button></div>' +
        '</div></div></div>';
        } else {

        // ── Safe history wrapper — prevents SecurityError in iframe/srcdoc envs ──
        function _safeHistoryPush(state, title, url) {

        }
        function _safeHistoryReplace(state, title, url) {
        try { history.replaceState(state, title, url); } catch(e) { /* iframe env — ignore */ }
        }

        function goPage(n) {
        const total = Math.ceil(filteredGames.length / PAGE_SIZE);

        _safeHistoryPush({ page: n }, '', '?p=' + n + (window.location.hash || ''));

        requestAnimationFrame(function() {
        requestAnimationFrame(function() {
        b.classList.add("open");
        });
        });
        }
        function closeSidebar() {
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("sidebar-backdrop").classList.remove("open");
        document.body.style.overflow = "";
        }
        function toggleSidebar() {
        const s = document.getElementById("sidebar");
        if (s.classList.contains("open")) { closeSidebar(); } else { openSidebar(); }
        }

        /* ============================================================
        PROXY FETCH
        ============================================================ */
        const PROXIES = [
        url => "https://api.allorigins.win/get?url=" + encodeURIComponent(url),
        url => "https://corsproxy.io/?" + encodeURIComponent(url),
        url => "https://thingproxy.freeboard.io/fetch/" + url,
        url => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url),
        ];

        async function fetchViaProxy(proxyFn, url) {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 9000);
        try {
        const res = await fetch(proxyFn(url), { signal: ctrl.signal });
        clearTimeout(timer);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const text = await res.text();
        try { const j = JSON.parse(text); return j.contents ? JSON.parse(j.contents) : j; } catch { return JSON.parse(text); }
        } catch(e) { clearTimeout(timer); throw e; }
        }

        async function fetchRace(url) { return Promise.any(PROXIES.map(p => fetchViaProxy(p, url))); }

        /* ============================================================
        NOTIFICATIONS
        ============================================================ */
        function showNotif(msg, type) {
        if (!type) type = "success";
        const notif = document.getElementById("notif");
        const toast = document.createElement("div"); toast.className = "notif-toast " + type;
        toast.innerHTML = (type === "success" ? "✓" : "✕") + " " + msg;
        notif.appendChild(toast);
        setTimeout(() => { toast.style.opacity = "0"; toast.style.transform = "translateX(20px)"; toast.style.transition = "all 0.3s"; setTimeout(() => toast.remove(), 300); }, 2500);
        }

        /* ============================================================
        KEYBOARD SHORTCUTS
        ============================================================ */
        document.addEventListener("keydown", e => {
        if (e.altKey && e.ctrlKey && e.shiftKey && e.key === "Enter") e.preventDefault();
        if (e.key === "Escape") {
        // Check correct modal IDs
        const gameModalOpen = document.getElementById("modal-overlay")?.classList.contains("open")
        || window._modalOpen === true;
        const dealModalOpen = document.getElementById("deal-modal")?.classList.contains("open");
        const suggOpen = document.getElementById("suggestions-dropdown")?.style.display !== 'none';

        if (gameModalOpen) {
        closeModalDirect();
        return;
        } else if (dealModalOpen) {
        closeDealModal();
        return;
        } else if (suggOpen) {
        document.getElementById("suggestions-dropdown").style.display = "none";
        return;
        } else {
        // No modal open — reset filters
        resetAll();
        }
        }
        if ((e.ctrlKey || e.metaKey) && e.key === "k") { e.preventDefault(); document.getElementById("search-input").focus(); }
        if (e.key === "F12") { e.preventDefault(); return false; }
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && ["I","J","C"].includes(e.key)) { e.preventDefault(); return false; }
        if ((e.ctrlKey || e.metaKey) && e.key === "U") { e.preventDefault(); return false; }
        if ((e.ctrlKey || e.metaKey) && e.key === "S") { e.preventDefault(); return false; }
        });

        // right-click enabled
        document.addEventListener("selectstart", e => { if (["INPUT","TEXTAREA"].includes(e.target.tagName)) return true; e.preventDefault(); return false; });

        /* ============================================================
        HERO SLIDER
        ============================================================ */
        /* ============================================================
        SCROLL-DRIVEN HERO SLIDER
        ============================================================ */
        let heroGames  = [];
        let heroIdx    = 0;
        let heroTimer  = null;
        let _heroNavStack = []; // history stack for back button

        function buildHeroSlider(games) {
        var featured = games.filter(function(g) {
        return g.latestFeatured === true && g.cover && g.status !== 'draft';
        });
        // If no featured games yet and still loading, hide slider and retry when fully loaded
        if (!featured.length) {
        document.getElementById('hero-slider-section').style.display = 'none';
        return;
        }
        heroGames = featured;
        if (!heroGames.length) { document.getElementById('hero-slider-section').style.display = 'none'; return; }
        document.getElementById('hero-slider-section').style.display = '';

        var slidesEl = document.getElementById('hero-slides');
        slidesEl.innerHTML = heroGames.map(function(g, i) {
        var tags = (g.genres || []).slice(0, 2).concat((g.themes || []).slice(0, 1))
        .map(function(t) { return '<span class="hero-slide-tag">' + t + '</span>'; }).join('');
        // No emojis — clean text badges only
        var badge = g.latestFeatured ? 'Featured' : (g.sponsored ? 'Sponsored' : 'Top Pick');
        var heroBg = g.steamAppId
        ? 'https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/' + g.steamAppId + '/library_hero.jpg'
        : (g.cover || '');
        var fallback1 = g.steamAppId
        ? 'https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/' + g.steamAppId + '/capsule_616x353.jpg'
        : '';
        var fallback2   = (g.cover || '').replace(/'/g, "\\'");
        var fallback1e  = fallback1.replace(/'/g, "\\'");
        var onerrorChain = fallback1
        ? "this.onerror=function(){this.src='" + fallback2 + "'};this.src='" + fallback1e + "'"
        : "this.src='" + fallback2 + "'";

        return '<div class="hero-slide' + (i === 0 ? ' active' : '') + '" id="hslide-' + i + '" data-idx="' + i + '">' +
        '<img class="hero-slide-bg" src="' + heroBg + '" alt="' + g.title + '" loading="' + (i === 0 ? 'eager' : 'lazy') + '" onerror="' + onerrorChain + '">' +
        '<div class="hero-slide-gradient"></div>' +
        '<div class="hero-slide-content">' +
        '<div class="hero-slide-badge">' + badge + '</div>' +
        '<div class="hero-slide-title">' + g.title + '</div>' +
        '<div class="hero-slide-desc">' + (g.description || '') + '</div>' +
        (tags ? '<div class="hero-slide-tags">' + tags + '</div>' : '') +
        '<div class="hero-slide-actions">' +
        '<button class="hero-slide-btn" onclick="openModal(\'' + g.id + '\')">' +
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>' +
        'View Game' +
        '</button>' +
        '</div>' +
        '</div>' +
        '</div>';
        }).join('');

        // Lines indicator
        var linesEl = document.getElementById('hero-lines');
        if (linesEl) {
        linesEl.innerHTML = heroGames.map(function(_, i) {
        return '<button class="hero-line' + (i === 0 ? ' active' : '') + '" onclick="heroGoTo(' + i + ', true)" aria-label="Slide ' + (i+1) + '"></button>';
        }).join('');
        }

        heroIdx = 0;
        _heroNavStack = [];
        // Wait for browser to render before measuring widths
        requestAnimationFrame(function() {
        requestAnimationFrame(function() {
        _updateHeroTrack();
        startHeroTimer();
        _initHeroScroll();
        _initHeroSwipe();
        });
        });

        // Show scroll hint, fade out after 4s
        var hint = document.getElementById('hero-scroll-hint');
        if (hint && heroGames.length > 1) {
        hint.style.opacity = '1';
        setTimeout(function() {
        hint.style.transition = 'opacity 1.2s';
        hint.style.opacity = '0';
        }, 4000);
        }
        }

        /* Move the flex track using CSS variable — no offsetWidth needed */
        function _updateHeroTrack() {
        var section = document.getElementById('hero-slider-section');
        var slidesEl = document.getElementById('hero-slides');
        if (!section || !slidesEl) return;

        var w = section.getBoundingClientRect().width;
        if (!w) return;

        document.querySelectorAll('.hero-slide').forEach(function(s) {
        s.style.width = w + 'px';
        s.style.minWidth = w + 'px';
        s.style.maxWidth = w + 'px';
        });
        slidesEl.style.transform = 'translateX(-' + (heroIdx * w) + 'px)';

        document.querySelectorAll('.hero-slide').forEach(function(s, i) {
        s.classList.toggle('active', i === heroIdx);
        });
        document.querySelectorAll('.hero-line').forEach(function(l, i) {
        l.classList.toggle('active', i === heroIdx);
        });
        }

        // Recalculate on resize
        window.addEventListener('resize', function() {
        if (heroGames.length) _updateHeroTrack();
        });


        function heroSlide(dir) {
        heroGoTo((heroIdx + dir + heroGames.length) % heroGames.length, true);
        }

        function heroGoTo(idx, pushHistory) {
        if (idx === heroIdx) return;
        if (pushHistory) _heroNavStack.push(heroIdx);
        heroIdx = idx;
        _updateHeroTrack();
        startHeroTimer();
        }

        /* Back button:
        - If we navigated between slides → go to previous slide
        - If on first slide and no slide history → browser history.back() */
        function heroGoBack() {
        if (_heroNavStack.length > 0) {
        var prev = _heroNavStack.pop();
        heroIdx = prev;
        _updateHeroTrack();
        startHeroTimer();
        } else {
        history.back();
        }
        }

        function startHeroTimer() {
        clearInterval(heroTimer);
        if (heroGames.length > 1) heroTimer = setInterval(function() { heroGoTo((heroIdx + 1) % heroGames.length, false); }, 5000);
        }

        /* Scroll-driven: wheel over hero section advances slides */
        function _initHeroScroll() {
        var section = document.getElementById('hero-slider-section');
        if (!section) return;
        var _scrollLock = false;
        section.addEventListener('wheel', function(e) {
        if (_scrollLock) return;
        if (Math.abs(e.deltaY) < 20) return; // ignore tiny nudges
        e.preventDefault();
        _scrollLock = true;
        if (e.deltaY > 0) heroGoTo((heroIdx + 1) % heroGames.length, true);
        else heroGoTo((heroIdx - 1 + heroGames.length) % heroGames.length, true);
        setTimeout(function() { _scrollLock = false; }, 750);
        }, { passive: false });
        }

        /* Swipe support for mobile */
        function _initHeroSwipe() {
        var section = document.getElementById('hero-slider-section');
        if (!section) return;
        var startX = 0, startY = 0;
        section.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        }, { passive: true });
        section.addEventListener('touchend', function(e) {
        var dx = e.changedTouches[0].clientX - startX;
        var dy = e.changedTouches[0].clientY - startY;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
        if (dx < 0) heroGoTo((heroIdx + 1) % heroGames.length, true);
        else heroGoTo((heroIdx - 1 + heroGames.length) % heroGames.length, true);
        }
        }, { passive: true });
        }


        /* ============================================================
        INIT
        ============================================================ */
        document.addEventListener("DOMContentLoaded", function() {
        initFirebase();
        var overlay = document.getElementById('modal-overlay');
        if (overlay) { overlay.classList.remove('open'); }
        window._modalOpen = false;
        });

        window.addEventListener('popstate', function(e) {
        const state = e.state || {};
        if (state.modal) {
        // Restore game modal
        if (typeof openModal === 'function') openModal(state.modal);
        } else if (state.page) {
        // Navigate to page without pushing new history entry
        const total = Math.ceil(filteredGames.length / PAGE_SIZE);
        const n = Math.max(1, Math.min(state.page, total));
        currentPage = n; renderGrid(); renderPagination();
        window.scrollTo({ top: 60, behavior: 'smooth' });
        } else {
        // Close any open modal
        window._modalOpen = false;
        var overlay = document.getElementById('modal-overlay');
        if (overlay) overlay.classList.remove('open');
        document.body.style.overflow = '';
        var vid = document.getElementById('modal-trailer-video');
        if (vid) { vid.pause(); vid.src = ''; }
        if (typeof closeDealModal === 'function') closeDealModal();
        // Go back to page 1 if no page in state
        if (currentPage > 1) {
        currentPage = 1; renderGrid(); renderPagination();
        window.scrollTo({ top: 60, behavior: 'smooth' });
        }
        }
        });

        (function() {
        var hash = window.location.hash;
        var m = hash.match(/#game=(.+)/);
        // Preserve page from URL if present
        var urlPage = parseInt(new URLSearchParams(window.location.search).get('p')) || 1;
        _safeHistoryReplace({ page: urlPage }, '', window.location.pathname + window.location.search);
        window._modalOpen = false;
        if (m && m[1]) {
        setTimeout(function() { if (typeof openModal === 'function') openModal(m[1]); }, 800);
        }
        })();

        /* ═══════════════════════════════════════════════════════════════
        DEAL MODAL
        ═══════════════════════════════════════════════════════════════ */
        let _currentDeal = null;

        function openDealModal(idxOrData) {
        let item;
        if (typeof idxOrData === 'string' && /^\d+$/.test(idxOrData)) {
        item = window._hotDealsData && window._hotDealsData[parseInt(idxOrData)];
        } else if (typeof idxOrData === 'object') {
        item = idxOrData;
        }
        if (!item) return;
        _currentDeal = item;

        // Populate basic info immediately
        document.getElementById('deal-modal-cover').src = item.cover || '';
        document.getElementById('deal-modal-cover').style.display = item.cover ? 'block' : 'none';
        document.getElementById('deal-modal-cover').onerror = function() { this.style.display='none'; };
        document.getElementById('deal-modal-title').textContent = item.title || '—';
        document.getElementById('deal-modal-tags').innerHTML = '';
        document.getElementById('deal-modal-desc').style.display = 'none';
        document.getElementById('deal-modal-loading').style.display = 'flex';

        // Show best price from what we already have
        const pricesList = document.getElementById('deal-modal-prices-list');
        pricesList.innerHTML = _buildPriceRow(item.shop, item.cut, item.price, item.regular);

        // Set CTA button to best deal URL
        const btn = document.getElementById('deal-modal-btn');
        btn.href = item.url || '#';

        // Open modal
        const overlay = document.getElementById('deal-modal-overlay');
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';

        // Lazy load extra details
        _loadDealDetails(item);
        }

        async function _loadDealDetails(item) {
        const loading  = document.getElementById('deal-modal-loading');
        const descEl   = document.getElementById('deal-modal-desc');
        const tagsEl   = document.getElementById('deal-modal-tags');
        const pricesEl = document.getElementById('deal-modal-prices-list');

        try {
        // Fetch prices + game data in parallel
        const params = new URLSearchParams();
        if (item.steamAppId) params.set('steamAppId', item.steamAppId);
        if (item.title)      params.set('title', item.title);

        const [pricesRes, gameRes] = await Promise.allSettled([
        item.id
        ? fetch('https://gamescout-worker.gamescout.workers.dev/api/itad-prices', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify([item.id])
        }).then(r => r.json())
        : Promise.resolve(null),
        fetch('https://gamescout-worker.gamescout.workers.dev/api/game-data?' + params.toString()).then(r => r.json())
        ]);

        // ── ITAD prices ──
        const itadVal    = pricesRes.status === 'fulfilled' ? pricesRes.value : null;
        const priceEntry = Array.isArray(itadVal) ? itadVal[0] : null;
        const allDeals   = priceEntry?.deals || [];

        if (allDeals.length) {
        const sorted = [...allDeals]
        .filter(d => d.price?.amount != null)
        .sort((a, b) => a.price.amount - b.price.amount);
        pricesEl.innerHTML = sorted.slice(0, 8).map(d =>
        _buildPriceRow(d.shop?.name, d.cut, d.price?.amount, d.regular?.amount, d.url)
        ).join('');
        const best = sorted[0];
        if (best?.url) document.getElementById('deal-modal-btn').href = best.url;
        } else {
        let html = _buildPriceRow(item.shop, item.cut, item.price, item.regular, item.url);
        const histLow = priceEntry?.historyLow?.all?.amount;
        if (histLow != null) {
        html += '<div class="deal-modal-price-row" style="opacity:0.5;">' +
        '<span class="deal-modal-price-shop">All-time Low</span>' +
        '<span class="deal-modal-price-amount">$' + parseFloat(histLow).toFixed(2) + '</span>' +
        '</div>';
        }
        pricesEl.innerHTML = html;
        }

        // ── Game data (description, tags, cover) ──
        const gameData = gameRes.status === 'fulfilled' ? gameRes.value : null;
        if (gameData) {
        if (gameData.description) {
        descEl.textContent = gameData.description;
        descEl.style.display = 'block';
        }
        if (gameData.tags?.length) {
        tagsEl.innerHTML = gameData.tags.map(function(t) {
        return '<span class="deal-modal-tag" data-t="' + t.replace(/"/g,'&quot;') + '" onclick="closeDealModal();applyBadgeFilter(\'genres\',this.dataset.t)">' + t + '</span>';
        }).join('');
        }
        if (gameData.cover) {
        const coverEl = document.getElementById('deal-modal-cover');
        if (coverEl && coverEl.style.display === 'none') {
        // Only set cover from gameData if we don't have one yet
        coverEl.src = gameData.cover;
        coverEl.style.display = 'block';
        coverEl.onerror = function() { this.style.display = 'none'; };
        }
        }
        }

        } catch(e) {}

        if (loading) loading.style.display = 'none';
        }

        function _buildPriceRow(shop, cut, price, regular, url) {
        const cutBadge = cut ? '<span class="deal-modal-price-cut">-' + cut + '%</span>' : '';
        const regStr   = regular && regular > price ? '<span class="deal-modal-price-regular">$' + parseFloat(regular).toFixed(2) + '</span>' : '';
        const priceStr = price != null ? '$' + parseFloat(price).toFixed(2) : '—';
        const inner = '<span class="deal-modal-price-shop">' + (shop || '—') + '</span>' + cutBadge + regStr + '<span class="deal-modal-price-amount">' + priceStr + '</span>';
        return url
        ? '<a class="deal-modal-price-row" href="' + url + '" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">' + inner + '</a>'
        : '<div class="deal-modal-price-row">' + inner + '</div>';
        }

        function closeDealModal() {
        document.getElementById('deal-modal-overlay').classList.remove('open');
        document.body.style.overflow = '';
        _currentDeal = null;
        }



        function _imgErr(el) { if(el) el.style.visibility = 'hidden'; }


        // ── Cover image fallback chain ───────────────────────────────────────────
        function _imgFallback(img, showPlaceholder) {
        const src = img.src || '';
        if (src.includes('capsule_616x353')) {
        // Try header.jpg
        img.src = src.replace('capsule_616x353.jpg', 'header.jpg');
        img.onerror = function() {
        if (showPlaceholder && img.nextElementSibling) img.nextElementSibling.style.display = 'flex';
        img.style.display = 'none';
        img.onerror = null;
        };
        } else if (src.includes('header.jpg')) {
        // Try capsule
        img.src = src.replace('header.jpg', 'capsule_616x353.jpg');
        img.onerror = function() {
        if (showPlaceholder && img.nextElementSibling) img.nextElementSibling.style.display = 'flex';
        img.style.display = 'none';
        img.onerror = null;
        };
        } else {
        if (showPlaceholder && img.nextElementSibling) img.nextElementSibling.style.display = 'flex';
        img.style.display = 'none';
        img.onerror = null;
        }
        }
    </script>
