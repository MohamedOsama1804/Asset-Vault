                    display: flex;
                    flex-wrap: wrap;
                    gap: 6px;
                    margin-bottom: 16px;
                }

                .active-pill {
                    display: flex;
                    align-items: center;
                    gap: 5px;
                    background: var(--neon-dim);
                    border: 1px solid var(--border-active);
                    border-radius: 100px;
                    padding: 3px 10px;
                    font-size: 0.75rem;
                    color: var(--neon);
                    cursor: pointer;
                    transition: all 0.15s;
                }

                    .active-pill:hover {
                        background: rgba(0,212,255,0.25);
                    }

                .active-pill-x {
                    font-size: 0.65rem;
                    opacity: 0.7;
                }

                /* ============================================================
           GAME GRID — 4 columns, larger cards
           ============================================================ */
                #games-grid {
                    display: grid;
                    grid-template-columns: repeat(3, 1fr);
                    gap: 16px;
                    padding: 10px 4px 10px 8px;
                }

                /* ============================================================
           GAME CARD
           ============================================================ */
                .game-card {
                    background: var(--bg-card);
                    border: 1px solid var(--border-subtle);
                    border-radius: var(--radius-md);
                    overflow: visible;
                    cursor: pointer;
                    position: relative;
                    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
                    will-change: transform;
                    display: flex;
                    flex-direction: column;
                    animation: cardIn 0.3s var(--transition) both;
                }

                @keyframes cardIn {
                    from {
                        opacity: 0;
                    }

                    to {
                        opacity: 1;
                    }
                }

                @keyframes spin {
                    to {
                        transform: rotate(360deg);
                    }
                }

                .game-card:hover {
                    transform: translateY(-28px) scale(1.12);
                    box-shadow: 0 50px 140px rgba(0,0,0,0.95), 0 0 0 1px rgba(0,212,255,0.5);
                    border-color: rgba(0,212,255,0.5);
                    z-index: 20;
                }

                .game-card.sponsored {
                    border-color: rgba(245,158,11,0.2);
                }

                .sponsored-badge {
                    position: absolute;
                    top: 10px;
                    right: 10px;
                    z-index: 5;
                    background: var(--accent-sponsored);
                    color: #000;
                    font-size: 0.6rem;
                    font-weight: 700;
                    letter-spacing: 0.1em;
                    padding: 2px 7px;
                    border-radius: 4px;
                    text-transform: uppercase;
                }

                /* Cover — aspect ratio 460×215 = ~2.14:1 */
                .card-cover-wrap {
                    position: relative;
                    overflow: hidden;
                    height: 0;
                    padding-bottom: 46.74%;
                    border-radius: var(--radius-md) var(--radius-md) 0 0;
                }

                .card-cover {
                    position: absolute;
                    inset: 0;
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                    transition: none;
                    background: var(--bg-deep);
                    display: block;
                }

                .game-card:hover .card-cover {
                    transform: none;
                }

                /* hover overlay — description + tags */
                .card-hover-overlay {
                    position: absolute;
                    inset: 0;
                    background: linear-gradient(to top, rgba(5,5,8,0.97) 0%, rgba(5,5,8,0.82) 55%, rgba(5,5,8,0.15) 100%);
                    opacity: 0;
                    transform: translateY(8px);
                    transition: opacity 0s, transform 0s;
                    display: flex;
                    flex-direction: column;
                    justify-content: flex-end;
                    padding: 12px;
                    gap: 7px;
                    pointer-events: none;
                    z-index: 10;
                }

                .game-card:hover .card-hover-overlay {
                    opacity: 1;
                    transform: translateY(0);
                    pointer-events: all;
                }

                .overlay-desc {
                    font-size: 0.72rem;
                    color: rgba(232,237,245,0.85);
                    line-height: 1.55;
                    display: -webkit-box;
                    -webkit-line-clamp: 3;
                    -webkit-box-orient: vertical;
                    overflow: hidden;
                }

                .overlay-tags {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 4px;
                }

                .overlay-tag {
                    font-size: 10px;
                    font-weight: 600;
                    padding: 3px 8px;
                    border-radius: 100px;
                    background: rgba(0,212,255,0.08);
                    color: rgba(0,212,255,0.9);
                    border: 1px solid rgba(0,212,255,0.22);
                    cursor: pointer;
                    transition: background 0.12s, color 0.12s;
                    user-select: none;
                    white-space: nowrap;
                }

                    .overlay-tag:hover {
                        background: rgba(0,212,255,0.18);
                        color: #00d4ff;
                    }

                .card-rating {
                    position: absolute;
                    top: 10px;
                    left: 10px;
                    z-index: 5;
                    font-size: 0.68rem;
                    font-weight: 700;
                    padding: 3px 8px;
                    border-radius: 5px;
                    backdrop-filter: blur(6px);
                    font-family: 'JetBrains Mono', monospace;
                    cursor: pointer;
                }

                .rating-overwhelmingly {
                    background: rgba(0,212,255,0.85);
                    color: #000;
                }

                .rating-very {
                    background: rgba(16,185,129,0.85);
                    color: #000;
                }

                .rating-positive {
                    background: rgba(100,200,100,0.75);
                    color: #000;
                }

                .rating-mixed {
                    background: rgba(245,158,11,0.85);
                    color: #000;
                }

                .rating-negative {
                    background: rgba(239,68,68,0.85);
                    color: #fff;
                }

                .ea-badge {
                    position: absolute;
                    bottom: 10px;
                    left: 10px;
                    z-index: 5;
                    font-size: 0.6rem;
                    font-weight: 600;
                    padding: 2px 7px;
                    border-radius: 4px;
                    background: rgba(124,58,237,0.88);
                    color: #fff;
                }

                /* Card body — clearer text */
                .card-body {
                    padding: 10px 12px 12px;
                    flex: 1;
                    display: flex;
                    flex-direction: column;
                }

                .card-title {
                    font-size: 0.82rem;
                    font-weight: 600;
                    line-height: 1.3;
                    margin-bottom: 6px;
                    color: var(--text-primary);
                    display: -webkit-box;
                    -webkit-line-clamp: 2;
                    -webkit-box-orient: vertical;
                    overflow: hidden;
                    transition: color 0.15s;
                }

                /* View toggle */

                .view-toggle {
                    display: flex;
                    gap: 5px;
                }

                .view-btn {
                    width: 38px;
                    height: 38px;
                    border-radius: var(--radius-sm);
                    border: 1px solid var(--border-subtle);
                    background: var(--bg-card);
                    color: var(--text-muted);
                    cursor: pointer;
                    transition: all 0.15s;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                }

                    .view-btn svg {
                        width: 18px;
                        height: 18px;
                    }

                    .view-btn:hover {
                        border-color: var(--neon);
                        color: var(--neon);
                    }

                    .view-btn.active {
                        background: var(--neon-dim);
                        border-color: var(--neon);
                        color: var(--neon);
                    }

                /* ============================================================
           LIST VIEW — Steam-style tall rows
           ============================================================ */
                #games-grid.list-view {
                    display: flex;
                    flex-direction: column;
                    gap: 3px;
                }

                    #games-grid.list-view .game-card {
                        flex-direction: row;
                        border-radius: var(--radius-md);
                        height: 320px;
                        animation: none;
                        transform: none !important;
                        overflow: hidden;
                    }

                        #games-grid.list-view .game-card:hover {
                            transform: none !important;
                            border-color: var(--border-active);
                            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
                            background: rgba(255,255,255,0.02);
                        }

                    #games-grid.list-view .sponsored-badge {
                        top: 10px;
                        right: 10px;
                        font-size: 0.58rem;
                    }

                    #games-grid.list-view .card-cover-wrap {
                        width: 480px;
                        flex-shrink: 0;
                        height: 100%;
                        padding-bottom: 0;
                        position: relative;
                        border-radius: var(--radius-md) 0 0 var(--radius-md);
                    }

                    #games-grid.list-view .card-cover {
                        position: absolute;
                        inset: 0;
                        object-fit: cover;
                        transition: none;
                    }

                    #games-grid.list-view .game-card:hover .card-cover {
                        transform: none;
                    }

                    #games-grid.list-view .card-hover-overlay {
                        display: none;
                    }

                    #games-grid.list-view .card-rating {
                        top: 10px;
                        left: 10px;
                        font-size: 0.7rem;
                        padding: 4px 9px;
                    }

                    #games-grid.list-view .ea-badge {
                        top: 10px;
                        right: 10px;
                        bottom: auto;
                        left: auto;
                    }

                    #games-grid.list-view .card-body {
                        flex: 1;
                        padding: 18px 22px;
                        display: flex;
                        flex-direction: row;
                        align-items: stretch;
                        gap: 20px;
                        min-width: 0;
                        justify-content: space-between;
                    }

                .list-main {
                    display: flex;
                    flex-direction: column;
                    gap: 8px;
                    flex: 1;
                    min-width: 0;
                    justify-content: center;
                }

                .list-title {
                    font-size: 1.05rem;
                    font-weight: 700;
                    color: #e8edf5;
                    white-space: nowrap;
                    overflow: hidden;
                    text-overflow: ellipsis;
                    letter-spacing: 0.01em;
                }

                .list-desc {
                    font-size: 0.82rem;
                    color: #9aabb8;
                    line-height: 1.6;
                    display: -webkit-box;
                    -webkit-line-clamp: 3;
                    -webkit-box-orient: vertical;
                    overflow: hidden;
                }

                .list-tags {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 5px;
                    margin-top: 2px;
                }

                .list-tag {
                    font-size: 0.72rem;
                    padding: 3px 10px;
                    border-radius: 4px;
                    border: 1px solid rgba(255,255,255,0.1);
                    color: #8a9baa;
                    background: rgba(255,255,255,0.03);
                    white-space: nowrap;
                    display: inline-flex;
                    align-items: center;
                    gap: 5px;
                    cursor: pointer;
                    transition: all 0.15s;
                }

                .list-tag-icon {
                    display: flex;
                    align-items: center;
                    flex-shrink: 0;
                }

                .list-tag-genre {
                    border-color: rgba(0,212,255,0.2);
                    color: #8ecfdf;
                    background: rgba(0,212,255,0.04);
                }

                    .list-tag-genre:hover {
                        border-color: #00d4ff;
                        color: #00d4ff;
                    }

                .list-tag-platform {
                    border-color: rgba(167,139,250,0.2);
                    color: #c0aff8;
                    background: rgba(167,139,250,0.04);
                }

                    .list-tag-platform:hover {
                        border-color: #a78bfa;
                        color: #a78bfa;
                    }

                .list-tag-theme {
                    border-color: rgba(251,191,36,0.2);
                    color: #d4b57a;
                    background: rgba(251,191,36,0.04);
                }

                    .list-tag-theme:hover {
                        border-color: #fbbf24;
                        color: #fbbf24;
                    }

                .list-right {
                    display: flex;
                    flex-direction: column;
                    align-items: flex-end;
                    justify-content: space-between;
                    gap: 8px;
                    flex-shrink: 0;
                    min-width: 170px;
                    padding: 4px 0;
                }

                .list-rating {
                    font-size: 0.8rem;
                    font-weight: 600;
                    text-align: right;
                    line-height: 1.4;
                }

                .list-price-row {
                    display: flex;
                    align-items: center;
                    gap: 8px;
                }

                .list-bottom {
                    display: flex;
                    flex-direction: column;
                    align-items: flex-end;
                    gap: 8px;
                }
                /* Store Links Builder */
                .store-links-builder {
                    background: var(--bg-card);
                    border: 1px solid var(--border-subtle);
                    border-radius: var(--radius-sm);
                    padding: 10px;
                    display: flex;
                    flex-direction: column;
                    gap: 8px;
                }

                .store-link-row {
                    display: flex;
                    gap: 8px;
                    align-items: center;
                }

                    .store-link-row input {
                        flex: 1;
                        background: var(--bg-panel);
                        border: 1px solid var(--border-subtle);
                        border-radius: var(--radius-sm);
                        color: var(--text-primary);
                        font-family: 'DM Sans', sans-serif;
                        font-size: 0.82rem;
                        padding: 6px 10px;
                        outline: none;
                        transition: border-color 0.2s;
                    }

                        .store-link-row input:focus {
                            border-color: var(--border-active);
                        }

                        .store-link-row input::placeholder {
                            color: var(--text-muted);
                        }

                .store-link-row-del {
                    background: none;
                    border: none;
                    color: var(--text-muted);
                    cursor: pointer;
                    font-size: 1rem;
                    padding: 4px 6px;
                    border-radius: 4px;
                    transition: color 0.15s;
                    flex-shrink: 0;
                }

                    .store-link-row-del:hover {
                        color: var(--danger);
                    }

                .store-link-add-btn {
                    background: none;
                    border: 1px dashed var(--border-subtle);
                    color: var(--text-muted);
                    font-size: 0.78rem;
                    padding: 6px 12px;
                    border-radius: var(--radius-sm);
                    cursor: pointer;
                    font-family: 'DM Sans', sans-serif;
                    transition: all 0.15s;
                    text-align: left;
                }

                    .store-link-add-btn:hover {
                        border-color: var(--neon);
                        color: var(--neon);
                    }

                /* Badge icons — colored SVG highlighted variants */
                .badge {
                    font-size: 0.72rem;
                    padding: 4px 9px;
                    border-radius: 100px;
                    border: 1px solid rgba(255,255,255,0.08);
                    color: var(--text-secondary);
                    cursor: pointer;
                    transition: all 0.15s;
                    white-space: nowrap;
                    display: inline-flex;
                    align-items: center;
                    gap: 5px;
                    font-weight: 500;
                }

                .badge-icon {
                    display: flex;
                    align-items: center;
                    flex-shrink: 0;
                }

                .badge:hover {
                    transform: translateY(-1px);
                }

                .badge-genre {
                    border-color: rgba(0,212,255,0.22);
                    color: #8ecfdf;
                    background: rgba(0,212,255,0.05);
                }

                    .badge-genre:hover {
                        border-color: #00d4ff;
                        color: #00d4ff;
                        background: rgba(0,212,255,0.12);
                    }

                .badge-platform {
                    border-color: rgba(167,139,250,0.25);
                    color: #c0aff8;
                    background: rgba(167,139,250,0.06);
                }

                    .badge-platform:hover {
                        border-color: #a78bfa;
                        color: #a78bfa;
                        background: rgba(167,139,250,0.15);
                    }

                .badge-visual {
                    border-color: rgba(52,211,153,0.22);
                    color: #86c8ae;
                    background: rgba(52,211,153,0.05);
                }

                    .badge-visual:hover {
                        border-color: #34d399;
                        color: #34d399;
                        background: rgba(52,211,153,0.12);
                    }

                .card-footer {
                    margin-top: auto;
                    padding-top: 8px;
                    border-top: 1px solid rgba(255,255,255,0.05);
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                }

                .card-price {
                    font-family: 'JetBrains Mono', monospace;
                    font-size: 0.9rem;
                    font-weight: 700;
                    color: var(--text-primary);
                }

                    .card-price.free {
                        color: var(--success);
                    }

                .card-actions {
                    display: flex;
                }

                .card-btn {
                    font-size: 0.75rem;
                    padding: 7px 14px;
                    border-radius: var(--radius-sm);
                    border: none;
                    cursor: pointer;
                    transition: all 0.18s;
                    font-family: 'DM Sans', sans-serif;
                    font-weight: 600;
                }

                .btn-main {
                    width: 100%;
                    background: linear-gradient(135deg, var(--neon) 0%, #0099cc 100%);
                    color: var(--bg-void);
                    font-weight: 700;
                    letter-spacing: 0.02em;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    gap: 7px;
                    text-decoration: none;
                    border-radius: var(--radius-sm);
                }

                    .btn-main:hover {
                        filter: brightness(1.15);
                        box-shadow: 0 0 18px rgba(0,212,255,0.4);
                        transform: translateY(-1px);
                    }

                /* ============================================================
           EMPTY / LOADING STATES
           ============================================================ */
                .skeleton-card {
                    background: var(--bg-card);
                    border: 1px solid var(--border-subtle);
                    border-radius: var(--radius-lg);
                    overflow: hidden;
                }

                .skeleton-cover {
                    padding-bottom: 46.74%;
                    background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
                    background-size: 200% 100%;
                    animation: shimmer 1.5s infinite;
                }

                .skeleton-body {
                    padding: 14px;
                    display: flex;
                    flex-direction: column;
                    gap: 8px;
                }

                .skeleton-line {
                    height: 10px;
                    border-radius: 4px;
                    background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
                    background-size: 200% 100%;
                    animation: shimmer 1.5s infinite;
                }

                    .skeleton-line.short {
                        width: 60%;
                    }

                @keyframes shimmer {
                    to {
                        background-position: -200% 0;
                    }
                }

                /* ============================================================
           PAGINATION
           ============================================================ */
                #pagination {
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    gap: 6px;
                    margin-top: 32px;
                    padding-bottom: 40px;
                }

                .page-btn {
                    width: 36px;
                    height: 36px;
                    border-radius: var(--radius-sm);
                    border: 1px solid var(--border-subtle);
                    background: var(--bg-card);
                    color: var(--text-secondary);
                    cursor: pointer;
                    transition: all 0.15s;
                    font-family: 'JetBrains Mono', monospace;
                    font-size: 0.8rem;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                }

                    .page-btn:hover {
                        border-color: var(--neon);
                        color: var(--neon);
                    }

                    .page-btn.active {
                        background: var(--neon-dim);
                        border-color: var(--neon);
                        color: var(--neon);
                    }

                    .page-btn:disabled {
                        opacity: 0.3;
                        cursor: not-allowed;
                    }

                .page-label {
                    font-family: 'DM Sans', sans-serif;
                    font-size: 0.85rem;
                    color: var(--text-secondary);
                    padding: 0 12px;
                    white-space: nowrap;
                    user-select: none;
                }

                /* ============================================================
           FLOATING RESET — maximum visibility
           ============================================================ */
                #reset-btn {
                    position: fixed;
                    bottom: 30px;
                    right: 30px;
                    z-index: 90;
                    background: var(--bg-panel);
                    border: 2px solid var(--neon);
                    color: var(--neon);
                    padding: 15px 28px;
                    border-radius: 100px;
                    cursor: pointer;
                    font-family: 'DM Sans', sans-serif;
                    font-size: 1rem;
                    font-weight: 800;
                    letter-spacing: 0.04em;
                    transition: all 0.25s var(--transition);
                    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 32px rgba(0,212,255,0.25);
                    display: none;
                    align-items: center;
                    gap: 10px;
                }

                    #reset-btn:hover {
                        background: var(--neon);
                        color: var(--bg-void);
                        transform: translateY(-3px) scale(1.04);
                        box-shadow: 0 16px 48px rgba(0,0,0,0.6), var(--neon-glow);
                    }

                    #reset-btn .reset-icon {
                        width: 20px;
                        height: 20px;
                        background: rgba(0,212,255,0.15);
                        border-radius: 50%;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        font-size: 0.75rem;
                        flex-shrink: 0;
                        transition: background 0.2s;
                    }

                    #reset-btn:hover .reset-icon {
                        background: rgba(0,0,0,0.15);
                    }

                /* ── Mobile: move reset btn inline above pagination, not floating ── */
                @media (max-width: 768px) {
                    #reset-btn {
                        position: static !important;
                        width: 100%;
                        justify-content: center;
                        margin: 12px 0 4px;
                        padding: 12px 20px;
                        font-size: 0.9rem;
                        box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 16px rgba(0,212,255,0.2);
                        border-radius: 12px;
                    }

                        #reset-btn:hover {
                            transform: none;
                        }
                    /* wrapper to place it above pagination */
                    #reset-btn-wrap {
                        padding: 0 16px;
                    }
                }

                /* ============================================================
           GAME DETAIL MODAL
           ============================================================ */
                #modal-overlay {
                    position: fixed;
                    inset: 0;
                    z-index: 500;
                    background: rgba(0,0,0,0.85);
                    backdrop-filter: blur(8px);
                    display: none;
                    align-items: center;
                    justify-content: center;
                    padding: 20px;
                    pointer-events: none;
                }

                    #modal-overlay.open {
                        display: flex;
                        pointer-events: auto;
                    }

                    #modal-overlay:not(.open) * {
                        pointer-events: none;
                    }

                #modal {
                    background: var(--bg-panel);
                    border: 1px solid var(--border-subtle);
                    border-radius: var(--radius-xl);
                    width: 100%;
                    max-width: 820px;
                    max-height: 90vh;
                    overflow-y: auto;
                    animation: modalIn 0.3s var(--transition);
                }

                @keyframes modalIn {
                    from {
                        opacity: 0;
                        transform: scale(0.95) translateY(20px);
                    }
                }

                .modal-header {
                    position: relative;
                }

                .modal-cover {
                    width: 100%;
                    height: 240px;
                    object-fit: cover;
                    display: block;
                    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
                }

                .modal-cover-gradient {
                    position: absolute;
                    bottom: 0;
                    left: 0;
                    right: 0;
                    height: 120px;
                    background: linear-gradient(to top, var(--bg-panel), transparent);
                }

                .modal-close {
                    position: absolute;
                    top: 14px;
                    left: 14px;
                    background: rgba(0,0,0,0.65);
                    backdrop-filter: blur(8px);
                    border: 1px solid rgba(255,255,255,0.12);
                    color: var(--text-primary);
                    height: 34px;
                    padding: 0 14px 0 10px;
                    border-radius: 20px;
                    cursor: pointer;
                    font-size: 0.75rem;
                    font-weight: 600;
                    display: flex;
                    align-items: center;
                    gap: 4px;
                    letter-spacing: 0.04em;
                    text-transform: uppercase;
                    transition: all 0.2s;
                    z-index: 10;
                }

                    .modal-close:hover {
                        background: rgba(0,212,255,0.15);
                        border-color: rgba(0,212,255,0.4);
                        color: var(--neon);
                    }

                .modal-body {
                    padding: 20px 24px 28px;
                }

                .modal-title {
                    font-family: 'Orbitron', monospace;
                    font-size: 1.4rem;
                    font-weight: 700;
                    margin-bottom: 8px;
                }

                .modal-meta {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 8px;
                    margin-bottom: 16px;
                }

                .modal-desc {
                    font-size: 0.92rem;
                    color: #b8c4d0;
                    line-height: 1.75;
                    margin-bottom: 20px;
                }

                .modal-grid {
                    display: grid;
                    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                    gap: 12px;
                    margin-bottom: 20px;
                }

                .modal-info-block {
                    background: var(--bg-card);
                    border: 1px solid var(--border-subtle);
                    border-radius: var(--radius-md);
                    padding: 14px;
                    transition: border-color 0.15s, background 0.15s;
                }

                    .modal-info-block[onclick]:hover {
                        border-color: var(--neon);
                        background: var(--neon-dim);
                    }

                .modal-info-label {
                    font-size: 0.65rem;
                    color: #7a8a9a;
                    text-transform: uppercase;
                    letter-spacing: 0.12em;
                    margin-bottom: 6px;
                    font-weight: 700;
                    display: flex;
                    align-items: center;
                    gap: 6px;
                }

                .modal-info-icon {
                    display: flex;
                    align-items: center;
                    color: var(--text-secondary);
                    flex-shrink: 0;
                }

                .modal-info-value {
                    font-size: 0.9rem;
                    font-weight: 600;
                    color: #dde4ed;
                }

                .modal-multi-tags {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 5px;
                    margin-top: 2px;
                }

                .modal-multi-tag {
                    font-size: 0.78rem;
                    font-weight: 600;
                    color: var(--text-secondary);
                    background: rgba(255,255,255,0.05);
                    border: 1px solid var(--border-subtle);
                    border-radius: 100px;
                    padding: 3px 9px;
                    cursor: pointer;
                    transition: all 0.15s;
                }

                    .modal-multi-tag:hover {
                        border-color: var(--neon);
                        color: var(--neon);
                        background: var(--neon-dim);
                    }

                .modal-filter-badge {
                    cursor: pointer;
                }

                    .modal-filter-badge:hover {
                        opacity: 0.85;
                        transform: translateY(-1px);
                    }

                .modal-store-section-title {
                    font-size: 0.75rem;
                    text-transform: uppercase;
                    letter-spacing: 0.12em;
                    color: var(--text-muted);
                    margin-bottom: 12px;
                    font-weight: 600;
                }

                .modal-store-links {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 10px;
                }

                .store-link-btn {
                    display: flex;
                    align-items: center;
                    gap: 9px;
                    background: rgba(255,255,255,0.04);
                    border: 1px solid rgba(0,212,255,0.2);
                    color: var(--text-primary);
                    padding: 11px 18px;
                    border-radius: var(--radius-md);
                    text-decoration: none;
                    font-size: 0.88rem;
                    font-weight: 600;
                    transition: all 0.2s;
                    cursor: pointer;
                    font-family: 'DM Sans', sans-serif;
                    min-width: 140px;
                }

                    .store-link-btn:hover {
                        border-color: var(--neon);
                        color: var(--neon);
                        background: var(--neon-dim);
                        transform: translateY(-2px);
                        box-shadow: 0 6px 20px rgba(0,212,255,0.15);
                    }

                    .store-link-btn .store-icon {
                        font-size: 1.1rem;
                    }

                    .store-link-btn .store-arrow {
                        margin-left: auto;
                        font-size: 0.8rem;
                        opacity: 0.6;
                    }

                /* ============================================================
           DEALS & DISCOUNTS SECTION
           ============================================================ */
                .deals-section {
                    margin-bottom: 24px;
                    background: linear-gradient(135deg, rgba(245,158,11,0.06) 0%, rgba(239,68,68,0.04) 100%);
                    border: 1px solid rgba(245,158,11,0.2);
                    border-radius: var(--radius-lg);
                    padding: 20px;
                    position: relative;
                    overflow: hidden;
                }

                    .deals-section::before {
                        content: '';
                        position: absolute;
                        top: 0;
                        right: 0;
                        width: 120px;
                        height: 120px;
                        background: radial-gradient(circle, rgba(245,158,11,0.12) 0%, transparent 70%);
                        pointer-events: none;
                    }

                .deals-header {
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    margin-bottom: 12px;
                }

                .deals-header-left {
                    display: flex;
                    align-items: center;
                    gap: 9px;
                }

                .deals-title {
                    font-family: 'Orbitron', monospace;
                    font-size: 0.85rem;
                    font-weight: 700;
                    color: #f0c070;
                    letter-spacing: 0.08em;
                }

                .deals-badge {
                    font-size: 0.65rem;
                    font-weight: 800;
                    padding: 4px 10px;
                    border-radius: 100px;
                    background: linear-gradient(135deg, #f59e0b, #ef4444);
                    color: #fff;
                    letter-spacing: 0.05em;
                    text-transform: uppercase;
                    animation: pulseBadge 2s ease-in-out infinite;
                }

                @keyframes pulseBadge {
                    0%,100% {
                        box-shadow: 0 0 0 0 rgba(245,158,11,0.4);
                    }

                    50% {
                        box-shadow: 0 0 0 6px rgba(245,158,11,0);
                    }
                }

                .deals-desc {
                    font-size: 0.82rem;
                    color: #9aabb8;
                    line-height: 1.65;
                    margin-bottom: 16px;
                    border-left: 2px solid rgba(245,158,11,0.3);
                    padding-left: 12px;
                }

                    .deals-desc strong {
                        color: #f0c070;
                    }

                .deals-grid {
                    display: grid;
                    grid-template-columns: repeat(2, 1fr);
                    gap: 8px;
                }

                .deal-btn {
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    background: rgba(255,255,255,0.03);
                    border: 1px solid rgba(255,255,255,0.08);
                    border-radius: var(--radius-md);
                    padding: 12px 16px;
                    text-decoration: none;
                    color: var(--text-primary);
                    transition: all 0.2s;
                    cursor: pointer;
                    gap: 10px;
                }

                    .deal-btn:hover {
                        border-color: rgba(245,158,11,0.4);
                        background: rgba(245,158,11,0.06);
                        transform: translateY(-2px);
                        box-shadow: 0 6px 20px rgba(0,0,0,0.3);
                    }

                .deal-btn-name {
                    font-size: 0.88rem;
                    font-weight: 600;
                    color: #dde4ed;
                }

                .deal-btn-right {
                    display: flex;
                    align-items: center;
                    gap: 8px;
                    flex-shrink: 0;
                }

                .deal-btn-discount {
                    font-family: 'JetBrains Mono', monospace;
                    font-size: 0.75rem;
                    font-weight: 700;
                    color: #fff;
                    background: linear-gradient(135deg, #f59e0b, #ef4444);
                    padding: 2px 8px;
                    border-radius: 4px;
                }

                .deal-btn-arrow {
                    color: var(--text-muted);
                    font-size: 0.8rem;
                    transition: transform 0.2s;
                }

                .deal-btn:hover .deal-btn-arrow {
                    transform: translate(2px, -2px);
                    color: #f59e0b;
                }

                .deals-empty {
                    text-align: center;
                    color: var(--text-muted);
                    font-size: 0.82rem;
                    padding: 12px 0;
                }

                /* ============================================================
           TAXONOMY MANAGER TAB
           ============================================================ */
                .taxonomy-manager {
                    display: flex;
                    flex-direction: column;
                    gap: 20px;
                }

                .taxonomy-section {
                    background: var(--bg-card);
                    border: 1px solid var(--border-subtle);
                    border-radius: var(--radius-md);
                    overflow: hidden;
                }

                .taxonomy-section-header {
                    padding: 12px 16px;
                    background: rgba(255,255,255,0.02);
                    border-bottom: 1px solid var(--border-subtle);
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                }

                .taxonomy-section-name {
                    font-size: 0.82rem;
                    font-weight: 600;
                    display: flex;
                    align-items: center;
                    gap: 8px;
                }

                .taxonomy-section-body {
                    padding: 14px 16px;
                }

                .taxonomy-items {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 6px;
                    margin-bottom: 12px;
                    min-height: 32px;
                }

                .taxonomy-item {
                    display: flex;
                    align-items: center;
                    gap: 5px;
                    background: var(--bg-panel);
                    border: 1px solid var(--border-subtle);
                    border-radius: 100px;
                    padding: 4px 8px 4px 12px;
                    font-size: 0.75rem;
                    color: var(--text-secondary);
                }

                .taxonomy-item-del {
                    background: none;
                    border: none;
                    color: var(--text-muted);
                    cursor: pointer;
                    font-size: 0.7rem;
                    padding: 0;
                    line-height: 1;
                    transition: color 0.15s;
                    width: 16px;
                    height: 16px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    border-radius: 50%;
                }

                    .taxonomy-item-del:hover {
                        color: var(--danger);
                        background: rgba(239,68,68,0.15);
                    }

                .checkbox-grid {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 8px;
                    background: var(--bg-panel);
                    border: 1px solid var(--border-subtle);
                    border-radius: var(--radius-sm);
                    padding: 10px 12px;
                }

                    .checkbox-grid label {
                        display: flex;
                        align-items: center;
                        gap: 6px;
                        font-size: 0.78rem;
                        color: var(--text-secondary);
                        cursor: pointer;
                        padding: 4px 8px;
                        border-radius: var(--radius-sm);
                        border: 1px solid transparent;
                        transition: all 0.15s;
                        user-select: none;
                    }

                        .checkbox-grid label:hover {
                            border-color: var(--border-active);
                            color: var(--text-primary);
                        }

                    .checkbox-grid input[type=checkbox] {
                        accent-color: var(--neon);
                        cursor: pointer;
                    }

                    .checkbox-grid label:has(input:checked) {
                        border-color: var(--neon);
                        color: var(--neon);
                        background: rgba(0,212,255,0.06);
                    }

                .taxonomy-item-eye {
                    background: none;
                    border: none;
                    cursor: pointer;
                    color: var(--text-muted);
                    font-size: 0.7rem;
                    padding: 0;
                    line-height: 1;
                    width: 16px;
                    height: 16px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    border-radius: 50%;
                    opacity: 0.6;
                    transition: all 0.15s;
                }

                    .taxonomy-item-eye:hover {
                        opacity: 1;
                        background: rgba(0,212,255,0.1);
                    }

                .tax-hidden {
                    opacity: 0.35;
                    text-decoration: line-through;
                    border-style: dashed;
                }

                .taxonomy-add-input {
                    flex: 1;
                    background: var(--bg-panel);
                    border: 1px solid var(--border-subtle);
                    color: var(--text-primary);
                    border-radius: var(--radius-sm);
                    padding: 7px 12px;
                    font-family: 'DM Sans', sans-serif;
                    font-size: 0.82rem;
                    outline: none;
                    transition: border-color 0.2s;
                }

                    .taxonomy-add-input:focus {
                        border-color: var(--border-active);
                    }

                /* Import/Export */
                .import-export-row {
                    display: flex;
                    gap: 10px;
                    margin-top: 16px;
                }

                #import-json-area {
                    width: 100%;
                    min-height: 120px;
                }

                /* Notifications */
                #notif {
                    position: fixed;
                    bottom: 80px;
                    right: 24px;
                    z-index: 700;
                    display: flex;
                    flex-direction: column;
                    gap: 8px;
                }

                .notif-toast {
                    background: var(--bg-panel);
                    border: 1px solid var(--border-subtle);
                    border-radius: var(--radius-md);
                    padding: 12px 16px;
                    font-size: 0.85rem;
                    color: var(--text-primary);
                    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
                    animation: toastIn 0.3s var(--transition);
                    display: flex;
                    align-items: center;
                    gap: 8px;
                }

                @keyframes toastIn {
                    from {
                        opacity: 0;
                        transform: translateX(20px);
                    }
                }

                .notif-toast.success {
                    border-color: rgba(16,185,129,0.4);
                }

                .notif-toast.error {
                    border-color: rgba(239,68,68,0.4);
                }

                /* Sidebar backdrop */
                #sidebar-backdrop {
                    position: fixed;
                    inset: 0;
                    background: rgba(0,0,0,0.75);
                    z-index: 290;
                    pointer-events: none;
                    opacity: 0;
                    transition: opacity 0.25s ease;
                }

                /* ============================================================
           RESPONSIVE
           ============================================================ */
                @media (max-width: 1200px) {
                    #games-grid {
                        grid-template-columns: repeat(3, 1fr);
                    }
                }

                @media (max-width: 900px) {
                    :root {
                        --sidebar-w: 0px;
                    }

                    /* Sidebar overlay */
                    #sidebar {
                        width: 280px !important;
                        transform: translateX(-100%);
                        box-shadow: 8px 0 32px rgba(0,0,0,0.5);
                        z-index: 300 !important;
                        top: 0 !important;
                        height: 100vh !important;
                    }

                        #sidebar.open {
                            transform: translateX(0);
                        }

                    #sidebar-backdrop.open {
                        opacity: 1;
                        pointer-events: auto;
                    }

                    /* Header — شيل backdrop-filter عشان ما يعملش stacking context يبلوك الـ sidebar
             وخليه two-row عشان السيرش يبقى full width */
                    #header {
                        backdrop-filter: none !important;
                        -webkit-backdrop-filter: none !important;
                        background: rgba(5,5,8,0.98) !important;
                        height: auto !important;
                        flex-wrap: wrap;
                        padding: 10px 14px;
                        gap: 8px;
                        row-gap: 8px;
                        z-index: 100;
                    }

                    #sidebar-toggle {
                        display: flex;
                        flex-shrink: 0;
                        order: 1;
                    }

                    .logo {
                        font-size: 1rem;
                        flex-shrink: 0;
                        order: 2;
                    }

                    .header-right {
                        margin-left: auto;
                        gap: 8px;
                        order: 3;
                    }

                    #search-wrap {
                        order: 10;
                        flex: 0 0 100%;
                        width: 100%;
                        max-width: 100%;
                    }

                    #search-input {
                        height: 42px;
                        font-size: 1rem;
                    }

                    /* Main content */
                    #main {
                        margin-left: 0;
                        padding: 16px;
                        width: 100%;
                        max-width: 100vw;
                        box-sizing: border-box;
                    }

                    .form-grid {
                        grid-template-columns: 1fr;
                    }

                    #games-grid {
                        grid-template-columns: repeat(2, 1fr);
                        gap: 10px;
                    }

                    .header-right {
                        gap: 8px;
                    }

                    #hero-banner {
                        padding: 16px;
                        margin-left: 0;
                        text-align: center;
                    }

                    #hero-tagline {
                        max-width: 100%;
                    }

                    #hero-sub {
                        font-size: 1rem;
                        white-space: normal;
                    }

                    #hero-inner {
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                    }

                    #hero-slider-section {
                        margin-top: 115px !important;
                        margin-left: 0 !important;
                        width: 100% !important;
                    }

                    .modal-box {
                        width: 96vw;
                        max-height: 92vh;
                        padding: 18px;
                        border-radius: var(--radius-md);
                    }

                    .modal-grid {
                        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                        gap: 8px;
                    }

                    .modal-cover {
                        height: 160px;
                    }

                    .modal-title {
                        font-size: 1.1rem;
                    }

                    .deals-grid {
                        grid-template-columns: 1fr;
                    }

                    .form-grid {
                        grid-template-columns: 1fr;
                    }

                    .inline-edit-grid {
                        grid-template-columns: 1fr;
                    }
                }
                /* merged into ≤768px block above */
                @media (max-width: 400px) {
                    #games-grid {
                        grid-template-columns: repeat(1, 1fr);
                        gap: 2px;
                    }

                    .modal-grid {
                        grid-template-columns: 1fr;
                    }

                    .sort-buttons {
                        grid-template-columns: 1fr 1fr;
                    }
                }

                /* ── HOT DEALS SECTION ─────────────────────────────── */
                #hot-deals-section {
                    margin-left: var(--sidebar-w);
                    width: calc(100% - var(--sidebar-w));
                    box-sizing: border-box;
                    padding: 28px 48px 40px;
                    border-bottom: 1px solid var(--border-subtle);
                    background: var(--bg-deep);
                    overflow: visible;
                }

                #hot-deals-header {
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    gap: 10px;
                    margin-bottom: 18px;
                }

                #hot-deals-title {
                    font-family: 'Orbitron', monospace;
                    font-size: 0.82rem;
                    font-weight: 700;
                    letter-spacing: 0.1em;
                    text-transform: uppercase;
                    display: flex;
                    align-items: center;
                    gap: 8px;
                    color: var(--text-primary);
                }

                #hd-text {
                    background: linear-gradient(180deg, #fff9c4 0%, #ffe066 18%, #ffab40 38%, #ff6432 58%, #cc2200 80%, #7a0000 100% );
                    -webkit-background-clip: text;
                    -webkit-text-fill-color: transparent;
                    background-clip: text;
                    animation: fire-text 2.4s ease-in-out infinite alternate;
                    filter: drop-shadow(0 0 4px rgba(255,100,30,0.55));
                }

                @keyframes fire-text {
                    0% {
                        background-position: 0% 0%;
                        filter: drop-shadow(0 0 3px rgba(255,100,30,0.5));
                    }

                    30% {
                        background-position: 0% 30%;
                        filter: drop-shadow(0 0 7px rgba(255,140,30,0.8));
                    }

                    60% {
                        background-position: 0% 60%;
                        filter: drop-shadow(0 0 5px rgba(255,80,20,0.65));
                    }

                    100% {
                        background-position: 0% 20%;
                        filter: drop-shadow(0 0 9px rgba(255,120,30,0.9));
                    }
                }

                @keyframes flicker {
                    0%,100% {
                        transform: scaleY(1) scaleX(1) rotate(0deg);
                        opacity: 1;
                    }

                    20% {
                        transform: scaleY(1.06) scaleX(0.97) rotate(-1deg);
                        opacity: 0.96;
                    }

                    40% {
                        transform: scaleY(0.97) scaleX(1.02) rotate(1deg);
                        opacity: 1;
                    }

                    60% {
                        transform: scaleY(1.04) scaleX(0.98) rotate(-0.5deg);
                        opacity: 0.98;
                    }

                    80% {
                        transform: scaleY(0.98) scaleX(1.01) rotate(0.5deg);
                        opacity: 1;
                    }
                }

                @keyframes glow-pulse {
                    0%,100% {
                        filter: drop-shadow(0 0 3px rgba(255,100,50,0.6)) drop-shadow(0 0 6px rgba(255,100,50,0.3));
                    }

                    50% {
                        filter: drop-shadow(0 0 6px rgba(255,100,50,0.9)) drop-shadow(0 0 12px rgba(255,150,50,0.5));
                    }
                }

                #hd-fire {
                    animation: flicker 1.8s ease-in-out infinite, glow-pulse 2.2s ease-in-out infinite;
                    transform-origin: center bottom;
                }

                #hot-deals-badge {
                    font-size: 0.65rem;
                    font-weight: 700;
                    padding: 3px 10px;
                    border-radius: 2px;
                    letter-spacing: 0.12em;
                    background: linear-gradient(180deg, #fff9c4 0%, #ffe066 18%, #ffab40 38%, #ff6432 58%, #cc2200 80%, #7a0000 100% );
                    -webkit-background-clip: text;
                    -webkit-text-fill-color: transparent;
                    background-clip: text;
                    border: 1px solid rgba(255,100,30,0.3);
                    animation: fire-text 2.4s ease-in-out infinite alternate;
                    filter: drop-shadow(0 0 4px rgba(255,100,30,0.55));
                }
                /* Unified section title style */
                .section-title {
                    font-family: 'Orbitron', monospace;
                    font-size: 0.82rem;
                    font-weight: 700;
                    letter-spacing: 0.1em;
                    text-transform: uppercase;
                    color: var(--text-primary);
                    display: flex;
                    align-items: center;
                    gap: 8px;
                }

                .section-header {
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    margin-bottom: 18px;
                }

                @keyframes pulse {
                    0%, 100% {
                        opacity: 1;
                    }

                    50% {
                        opacity: 0.7;
                    }
                }
                /* Hot Deals arrows */
                .hd-arrow {
                    position: absolute;
                    top: 0;
                    bottom: 0;
                    width: 56px;
                    z-index: 10;
                    border: none;
                    cursor: pointer;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    transition: opacity 0.2s;
                    opacity: 0.7;
                }

                /* Wrapper for arrows + scroll — no stacking context */
                .hd-scroll-wrap {
                    position: relative;
                    isolation: auto;
                }

                    .hd-arrow:hover {
                        opacity: 1;
                    }

                .hd-arrow-prev {
                    left: 0;
                    background: linear-gradient(to right, rgba(5,5,8,0.95) 0%, transparent 100%);
                }

                .hd-arrow-next {
                    right: 0;
                    background: linear-gradient(to left, rgba(5,5,8,0.95) 0%, transparent 100%);
                }

                .hd-arrow svg {
                    color: #fff;
                    filter: drop-shadow(0 0 6px rgba(0,212,255,0.6));
                }

                #hot-deals-scroll {
                    display: flex;
                    gap: 12px;
                    overflow-x: scroll;
                    overflow-y: visible;
                    scrollbar-width: thin;
                    scrollbar-color: rgba(0,212,255,0.25) transparent;
                    padding-bottom: 60px;
                    margin-bottom: -60px;
                    padding-top: 50px;
                    margin-top: -50px;
                    padding-left: 10px;
                    padding-right: 10px;
                    cursor: grab;
                    -webkit-overflow-scrolling: touch;
                    user-select: none;
                }

                    #hot-deals-scroll::-webkit-scrollbar {
                        height: 4px;
                    }

                    #hot-deals-scroll::-webkit-scrollbar-track {
                        background: transparent;
                    }

                    #hot-deals-scroll::-webkit-scrollbar-thumb {
                        background: rgba(0,212,255,0.25);
                        border-radius: 2px;
                    }

                        #hot-deals-scroll::-webkit-scrollbar-thumb:hover {
                            background: rgba(0,212,255,0.5);
                        }

                    #hot-deals-scroll.hd-dragging {
                        cursor: grabbing;
                    }

                .hot-deal-card {
                    flex: 0 0 340px;
                    min-width: 0;
                }

                .hot-deal-card {
                    border-radius: 0;
                    background: var(--bg-card);
                    border: none;
                    overflow: visible;
                    cursor: pointer;
                    transition: transform 0.2s ease, box-shadow 0.2s ease;
                    will-change: transform;
                    position: relative;
                    min-width: 0;
                    text-decoration: none;
                    color: inherit;
                    display: block;
                }

                    .hot-deal-card:hover {
                        transform: translateY(-20px) scale(1.08);
                        box-shadow: 0 40px 100px rgba(0,0,0,0.95), 0 0 0 1px rgba(0,212,255,0.5);
                        z-index: 20;
                    }

                        .hot-deal-card:hover .hot-deal-name {
                            color: var(--neon);
                        }

                .hot-deal-cover-wrap {
                    position: relative;
                    width: 100%;
                    aspect-ratio: 16/9;
                    overflow: hidden;

                .chart-panel {
                    background: transparent;
                    border: none;

                    justify-content: space-between;

                    margin-bottom: 18px;

                .chart-panel-icon {

                .chart-panel-title {
                    font-family: 'Orbitron', monospace;
                    font-size: 0.82rem;
                    font-weight: 700;

                @keyframes title-glow-purple {
                    0% {
                        text-shadow: 0 0 6px rgba(167,139,250,0.4), 0 0 14px rgba(167,139,250,0.1);

                .chart-panel-subtitle {

                    font-weight: 500;

                }

                .chart-list {
                    display: flex;
                    flex-direction: row;
                    gap: 2px;
                    overflow-x: scroll;
                    overflow-y: visible;
                    scrollbar-width: thin;
                    scrollbar-color: rgba(167,139,250,0.25) transparent;
                    padding-bottom: 60px;
                    margin-bottom: -60px;
                    padding-top: 50px;
                    margin-top: -50px;
                    padding-left: 10px;
                    padding-right: 10px;
                    cursor: grab;
                    -webkit-overflow-scrolling: touch;
                    user-select: none;
                }

                    .chart-list::-webkit-scrollbar {
                        height: 4px;
                    }

                    .chart-list::-webkit-scrollbar-track {
                        background: transparent;
                    }

                    .chart-list::-webkit-scrollbar-thumb {
                        background: rgba(167,139,250,0.25);
                        border-radius: 2px;
                    }

                        .chart-list::-webkit-scrollbar-thumb:hover {
                            background: rgba(167,139,250,0.5);
                        }

                    .chart-list.hd-dragging {
                        cursor: grabbing;
                    }

                .chart-row {
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    gap: 8px;
                    padding: 0 0 10px;
                    cursor: pointer;
                    text-align: center;
                    border-radius: 0;
                    border: none;
                    background: var(--bg-card);
                    overflow: visible;
                    transition: transform 0.2s ease, box-shadow 0.2s ease;
                    will-change: transform;

                    flex: 0 0 420px;

                    }

                        }

                .chart-rank {

                    font-size: 0.62rem;
                    font-weight: 800;
                    line-height: 1;
                    background: rgba(0,212,255,0.18);
                    color: var(--neon);
                    border: 1px solid rgba(0,212,255,0.35);
                    border-radius: 4px;
                    padding: 2px 5px;
                    backdrop-filter: blur(4px);
                    text-shadow: 0 0 8px rgba(0,212,255,0.8);

                }

                @keyframes rank-glow {
                    0% {
                        box-shadow: 0 0 4px rgba(0,212,255,0.3);
                    }

                    100% {
                        box-shadow: 0 0 10px rgba(0,212,255,0.7), 0 0 20px rgba(0,212,255,0.2);
                    }
                }

                .chart-rank.top3 {
                    color: var(--neon);
                }

                .chart-thumb-wrap {
                    position: relative;
                    width: 100%;
                    aspect-ratio: 16/9;
                    overflow: hidden;
                    display: block;
                    isolation: isolate;
                }

                .chart-thumb {
                    position: absolute;
                    inset: 0;
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                    background: var(--bg-panel);
                    border: none;
                    opacity: 1;
                    z-index: 1;
                    transition: none;
                    display: block;
                }

                .chart-info {
                    width: 100%;
                    min-width: 0;
                }

                .chart-title {
                    font-size: 0.72rem;
                    font-weight: 600;
                    color: var(--text-primary);
                    white-space: nowrap;
                    overflow: hidden;
                    text-overflow: ellipsis;
                    transition: color 0.2s;
                    margin-bottom: 3px;
                    padding: 0 6px;
                }

                .chart-badge {
                    font-size: 0.65rem;
                    font-weight: 700;
                    padding: 2px 6px;
                    border-radius: 4px;
                    display: inline-block;
                }

                    .chart-badge.badge-rating {
                        background: rgba(124,58,237,0.15);
                        color: #a78bfa;
                    }

                .chart-divider {
                    display: none;
                }

                @media (max-width: 1100px) {
                    /* chart-list stays horizontal scroll on all sizes */
                    .chart-row {
                        flex: 0 0 200px;
                    }
                }

                @media (max-width: 768px) {
                    #charts-section {
                        margin-left: 0;

                        max-width: 100vw;
                        box-sizing: border-box;
                        padding: 14px 12px;
                    }

                    .chart-list {
                        display: flex !important;
                        flex-direction: row !important;
                        gap: 8px !important;
                        overflow-x: scroll !important;
                        overflow-y: visible !important;
                        padding-bottom: 6px !important;
                        scroll-snap-type: x mandatory !important;
                        -webkit-overflow-scrolling: touch !important;

                    }

                    .chart-row {
                        flex: 0 0 165px !important;

                    }

                    .chart-thumb-wrap {
                        aspect-ratio: 16/9 !important;
                        border-radius: 10px 10px 0 0 !important;
                    }

                    .chart-info {
                        padding: 6px 8px 0 !important;

                        box-sizing: border-box !important;
                    }

                    .chart-title {
                        font-size: 0.72rem !important;
                        white-space: nowrap !important;
                        padding: 0 !important;
                        overflow: hidden !important;

                    }
