    <style>
                /* ============================================================
           CSS VARIABLES & RESET
           ============================================================ */
                :root {
                    --bg-void: #050508;
                    --bg-deep: #080b12;
                    --bg-panel: #0d1117;
                    --bg-card: #111520;
                    --bg-card-hover: #161c2e;
                    --bg-glass: rgba(13, 17, 23, 0.85);
                    --border-subtle: rgba(255,255,255,0.04);
                    --border-active: rgba(0, 212, 255, 0.3);
                    --neon: #00d4ff;
                    --neon-dim: rgba(0, 212, 255, 0.15);
                    --neon-glow: 0 0 20px rgba(0, 212, 255, 0.4), 0 0 60px rgba(0, 212, 255, 0.1);
                    --accent2: #7c3aed;
                    --accent-sponsored: #f59e0b;
                    --text-primary: #e8edf5;
                    --text-secondary: #6b7a94;
                    --text-muted: #3d4a60;
                    --success: #10b981;
                    --danger: #ef4444;
                    --radius-sm: 6px;
                    --radius-md: 12px;
                    --radius-lg: 18px;
                    --radius-xl: 24px;
                    --sidebar-w: 280px;
                    --transition: cubic-bezier(0.16, 1, 0.3, 1);
                }

                *, *::before, *::after {
                    box-sizing: border-box;
                    margin: 0;
                    padding: 0;
                }

                html {
                    font-size: 14px;
                    scroll-behavior: smooth;
                    overflow-x: hidden;
                    max-width: 100vw;
                }

                body {
                    font-family: 'DM Sans', sans-serif;
                    background: var(--bg-void);
                    color: var(--text-primary);
                    min-height: 100vh;
                    overflow-x: hidden;
                    max-width: 100vw;
                    position: relative;
                }

                    body::before {
                        content: '';
                        position: fixed;
                        inset: 0;
                        background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
                        pointer-events: none;
                        z-index: 9999;
                    }

                    body::after {
                        content: '';
                        position: fixed;
                        inset: 0;
                        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
                        pointer-events: none;
                        z-index: 9998;
                        opacity: 0.4;
                    }

                ::-webkit-scrollbar {
                    width: 0px;
                    height: 4px;
                }

                ::-webkit-scrollbar-track {
                    background: transparent;
                }

                ::-webkit-scrollbar-thumb {
                    background: transparent;
                    border-radius: 4px;
                }

                body {
                    scrollbar-width: none;
                }

                /* ============================================================
           HEADER
           ============================================================ */
                #header {
                    position: fixed;
                    top: 0;
                    left: 0;
                    right: 0;
                    z-index: 9998;
                    height: 60px;
                    background: var(--bg-glass);
                    backdrop-filter: blur(20px) saturate(1.5);
                    border-bottom: 1px solid var(--border-subtle);
                    display: flex;
                    align-items: center;
                    gap: 20px;
                    padding: 0 20px;
                }

                /* LOGO — GameScout */
                .logo {
                    font-family: 'Orbitron', monospace;
                    font-size: 1.2rem;
                    font-weight: 900;
                    letter-spacing: 0.08em;
                    color: var(--neon);
                    text-shadow: 0 0 10px rgba(0,212,255,0.6), 0 0 24px rgba(0,212,255,0.25);
                    animation: logoGlow 3s ease-in-out infinite;
                    flex-shrink: 0;
                    cursor: pointer;
                    white-space: nowrap;
                }

                @keyframes logoGlow {
                    0%,100% {
                        text-shadow: 0 0 8px rgba(0,212,255,0.5), 0 0 20px rgba(0,212,255,0.2);
                    }

                    50% {
                        text-shadow: 0 0 14px rgba(0,212,255,0.9), 0 0 32px rgba(0,212,255,0.4);
                        color: #33e5ff;
                    }
                }

                .logo .logo-accent {
                    color: var(--text-secondary);
                    font-weight: 400;
                    font-size: 0.75em;
                }

                #search-wrap {
                    flex: 1;
                    max-width: 600px;
                    position: relative;
                }

                #search-input {
                    width: 100%;
                    height: 38px;
                    background: rgba(255,255,255,0.04);
                    border: 1px solid var(--border-subtle);
                    border-radius: var(--radius-md);
                    color: var(--text-primary);
                    font-family: 'DM Sans', sans-serif;
                    font-size: 0.95rem;
                    padding: 0 40px 0 42px;
                    outline: none;
                    transition: border-color 0.2s, background 0.2s;
                }

                    #search-input:focus {
                        border-color: var(--border-active);
                        background: rgba(0,212,255,0.04);
                    }

                    #search-input::placeholder {
                        color: var(--text-muted);
                    }

                .search-icon {
                    position: absolute;
                    left: 12px;
                    top: 50%;
                    transform: translateY(-50%);
                    color: var(--text-muted);
                    pointer-events: none;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    transition: color 0.2s, transform 0.2s;
                }

                    #search-input:focus ~ .search-icon,
                    .search-icon.active {
                        color: var(--neon);
                    }

                #search-wrap:focus-within .search-icon {
                    color: var(--neon);
                    transform: translateY(-50%) scale(1.1);
                }

                    #search-wrap:focus-within .search-icon svg {
                        filter: drop-shadow(0 0 4px rgba(0,212,255,0.6));
                    }

                #search-clear {
                    position: absolute;
                    right: 10px;
                    top: 50%;
                    transform: translateY(-50%);
                    background: none;
                    border: none;
                    color: var(--text-muted);
                    cursor: pointer;
                    font-size: 1rem;
                    display: none;
                    padding: 4px;
                    border-radius: 4px;
                    transition: color 0.2s;
                }

                    #search-clear:hover {
                        color: var(--text-primary);
                    }

                #suggestions-dropdown {
                    position: fixed;
                    top: auto;
                    left: auto;
                    right: auto;
                    background: var(--bg-panel);
                    border: 1px solid var(--border-active);
                    border-radius: var(--radius-md);
                    overflow: hidden;
                    display: none;
                    z-index: 9000;
                    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
                }

                .suggestion-item {
                    padding: 10px 16px;
                    cursor: pointer;
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    transition: background 0.15s;
                    font-size: 0.9rem;
                }

                    .suggestion-item:hover {
                        background: var(--neon-dim);
                    }

                .suggestion-thumb {
                    width: 32px;
                    height: 32px;
                    border-radius: 4px;
                    object-fit: cover;
                    background: var(--bg-card);
                    flex-shrink: 0;
                }

                .suggestion-meta {
                    font-size: 0.75rem;
                    color: var(--text-secondary);
                }

                .header-right {
                    margin-left: auto;
                    display: flex;
                    align-items: center;
                    gap: 12px;
                }

                #game-count-badge {
                    display: none !important;
                }

                /* Hide game counter completely */
                #results-info { display: none !important; }
                #results-bar { display: none !important; }

                #sidebar-toggle {
                    display: none;
                    background: none;
                    border: 1px solid var(--border-subtle);
                    color: var(--text-secondary);
                    width: 36px;
                    height: 36px;
                    border-radius: var(--radius-sm);
                    cursor: pointer;
                    font-size: 1.1rem;
                    align-items: center;
                    justify-content: center;
                    flex-shrink: 0;
                    transition: all 0.2s;
                }

                    #sidebar-toggle:hover {
                        border-color: var(--neon);
                        color: var(--neon);
                    }

                /* ============================================================
           LAYOUT
           ============================================================ */
                #sidebar {
                    width: var(--sidebar-w);
                    flex-shrink: 0;
                    background: var(--bg-panel);
                    border-right: 1px solid var(--border-subtle);
                    height: calc(100vh - 60px);
                    overflow-y: auto;
                    overflow-x: hidden;
                    position: fixed;
                    top: 60px;
                    left: 0;
                    transition: transform 0.3s ease;
                    z-index: 9999;
                }

                .sidebar-header {
                    padding: 16px 16px 12px;
                    border-bottom: 1px solid var(--border-subtle);
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                }

                .sidebar-title {
                    font-family: 'Orbitron', monospace;
                    font-size: 0.72rem;
                    font-weight: 700;
                    letter-spacing: 0.15em;
                    color: #c8d0dc;
                    text-transform: uppercase;
                    display: flex;
                    align-items: center;
                    gap: 8px;
                }

                #active-filter-count {
                    font-family: 'JetBrains Mono', monospace;
                    font-size: 0.7rem;
                    background: var(--neon);
                    color: var(--bg-void);
                    border-radius: 100px;
                    padding: 2px 10px;
                    display: none;
                    font-weight: 700;
                    white-space: nowrap;
                    max-width: 140px;
                    overflow: hidden;
                    text-overflow: ellipsis;
                }

                .filter-toggles {
                    padding: 12px 16px;
                    display: flex;
                    flex-direction: column;
                    gap: 8px;
                    border-bottom: 1px solid var(--border-subtle);
                }

                .toggle-row {
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    cursor: pointer;
                    gap: 8px;
                }

                .toggle-label {
                    font-size: 0.85rem;
                    color: var(--text-secondary);
                    user-select: none;
                }

                .toggle-switch {
                    width: 32px;
                    height: 18px;
                    background: var(--bg-card);
                    border: 1px solid var(--border-subtle);
                    border-radius: 100px;
                    position: relative;
                    transition: all 0.2s;
                    flex-shrink: 0;
                    cursor: pointer;
                }

                    .toggle-switch::after {
                        content: '';
                        position: absolute;
                        top: 2px;
                        left: 2px;
                        width: 12px;
                        height: 12px;
                        background: var(--text-muted);
                        border-radius: 50%;
                        transition: all 0.2s;
                    }

                    .toggle-switch.on {
                        background: var(--neon-dim);
                        border-color: var(--neon);
                    }

                        .toggle-switch.on::after {
                            transform: translateX(14px);
                            background: var(--neon);
                        }

                .filter-section {
                    border-bottom: 1px solid var(--border-subtle);
                }

                .filter-section-header {
                    padding: 13px 16px;
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    cursor: pointer;
                    user-select: none;
                    transition: background 0.15s;
                }

                    .filter-section-header:hover {
                        background: rgba(255,255,255,0.03);
                    }

                .filter-section-name {
                    font-size: 0.75rem;
                    font-weight: 700;
                    color: #c8d0dc;
                    letter-spacing: 0.08em;
                    text-transform: uppercase;
                    display: flex;
                    align-items: center;
                    gap: 8px;
                }

                .filter-icon {
                    color: var(--text-secondary);
                    display: flex;
                    align-items: center;
                    flex-shrink: 0;
                }

                .filter-chevron {
                    color: var(--text-muted);
                    transition: transform 0.2s;
                    flex-shrink: 0;
                }

                .filter-section.collapsed .filter-chevron {
                    transform: rotate(0deg);
                }

                .filter-section:not(.collapsed) .filter-chevron {
                    transform: rotate(90deg);
                }

                .filter-section-body {
                    padding: 4px 12px 14px;
                }

                .filter-section.collapsed .filter-section-body {
                    display: none;
                }

                .filter-chips {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 5px;
                }

                .price-range-wrap {
                    display: flex;
                    align-items: center;
                    gap: 8px;
                    width: 100%;
                    padding: 2px 0;
                }

                    .price-range-wrap input {
                        width: 0;
                        flex: 1;
                        background: rgba(255,255,255,0.04);
                        border: 1px solid rgba(255,255,255,0.1);
                        border-radius: 7px;
                        color: var(--text-primary);
                        font-size: 0.8rem;
                        padding: 6px 10px;
                        font-family: 'JetBrains Mono', monospace;
                        transition: border-color 0.15s;
                    }

                        .price-range-wrap input:focus {
                            outline: none;
                            border-color: rgba(0,212,255,0.5);
                            background: rgba(0,212,255,0.04);
                        }

                        .price-range-wrap input::placeholder {
                            color: rgba(255,255,255,0.2);
                        }

                .price-range-sep {
                    font-size: 0.72rem;
                    color: var(--text-muted);
                    white-space: nowrap;
                    flex-shrink: 0;
                }

                .price-apply-btn {
                    width: 100%;
                    margin-top: 8px;
                    background: rgba(0,212,255,0.08);
                    border: 1px solid rgba(0,212,255,0.2);
                    color: var(--neon);
                    border-radius: 7px;
                    padding: 6px;
                    font-size: 0.75rem;
                    font-weight: 600;
                    cursor: pointer;
                    letter-spacing: 0.05em;
                    transition: background 0.15s, border-color 0.15s;
                }

                    .price-apply-btn:hover {
                        background: rgba(0,212,255,0.16);
                        border-color: rgba(0,212,255,0.4);
                    }

                .price-active-badge {
                    font-size: 0.7rem;
                    color: var(--neon);
                    background: rgba(0,212,255,0.12);
                    border: 1px solid rgba(0,212,255,0.25);
                    border-radius: 4px;
                    padding: 1px 7px;
                    margin-top: 6px;
                    display: none;
                    width: fit-content;
                }

                .rating-tip {
                    display: flex;
                    align-items: flex-start;
                    gap: 6px;
                    background: rgba(0,212,255,0.05);
                    border: 1px solid rgba(0,212,255,0.2);
                    border-radius: var(--radius-sm);
                    padding: 8px 10px;
                    margin-bottom: 8px;
                    font-size: 0.72rem;
                    color: var(--text-secondary);
                    line-height: 1.4;
                }

                    .rating-tip svg {
                        flex-shrink: 0;
                        margin-top: 1px;
                        color: var(--neon);
                    }

                    .rating-tip strong {
                        color: var(--text-primary);
                    }

                .filter-chip {
                    font-size: 0.78rem;
                    padding: 5px 11px;
                    border-radius: 100px;
                    border: 1px solid var(--border-subtle);
                    background: var(--bg-card);
                    color: #a8b4c0;
                    cursor: pointer;
                    transition: all 0.15s;
                    user-select: none;
                    white-space: nowrap;
                    font-family: 'DM Sans', sans-serif;
                    font-weight: 500;
                }

                    .filter-chip:hover {
                        border-color: var(--neon);
                        color: var(--neon);
                        background: var(--neon-dim);
                    }

                    .filter-chip.active {
                        background: var(--neon-dim);
                        border-color: var(--neon);
                        color: var(--neon);
                        font-weight: 600;
                    }

                .sort-row {
                    padding: 12px 16px;
                    border-bottom: 1px solid var(--border-subtle);
                }

                .sort-label {
                    font-size: 0.68rem;
                    color: var(--text-muted);
                    text-transform: uppercase;
                    letter-spacing: 0.1em;
                    margin-bottom: 8px;
                }

                .sort-buttons {
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 5px;
                }

                .sort-btn {
                    font-size: 0.75rem;
                    padding: 7px 8px;
                    border-radius: var(--radius-sm);
                    border: 1px solid var(--border-subtle);
                    background: var(--bg-card);
                    color: var(--text-secondary);
                    cursor: pointer;
                    transition: all 0.15s;
                    font-family: 'DM Sans', sans-serif;
                    font-weight: 600;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    gap: 5px;
                }

                    .sort-btn:hover {
                        border-color: var(--neon);
                        color: var(--neon);
                    }

                    .sort-btn.active {
                        background: var(--neon-dim);
                        border-color: var(--neon);
                        color: var(--neon);
                    }

                /* ============================================================
           HERO SLOGAN BANNER
           ============================================================ */
                #hero-banner {
                    margin-left: var(--sidebar-w);
                    padding: 28px 32px 22px;
                    border-bottom: 1px solid var(--border-subtle);
                    background: linear-gradient(135deg, rgba(0,212,255,0.04) 0%, transparent 60%);
                    position: relative;
                    overflow: hidden;
                }

                    #hero-banner::before {
                        content: '';
                        position: absolute;
                        top: 0;
                        left: 0;
                        right: 0;
                        bottom: 0;
                        background: radial-gradient(ellipse at 20% 50%, rgba(0,212,255,0.06) 0%, transparent 60%);
                        pointer-events: none;
                    }

                #hero-inner {
                    position: relative;
                    z-index: 1;
                }

                #hero-tagline {
                    font-family: 'DM Sans', sans-serif;
                    font-size: 0.9rem;
                    font-weight: 400;
                    color: #7a8fa8;
                    line-height: 1.6;
                    margin: 0 0 6px;
                    max-width: 580px;
                    letter-spacing: 0.01em;
                }

                #hero-sub {
                    font-family: 'Orbitron', monospace;
                    font-size: 1.35rem;
                    font-weight: 700;
                    color: #c8d8e8;
                    margin: 0;
                    letter-spacing: 0.04em;
                    line-height: 1.2;
                }

                #hero-sub-accent {
                    color: var(--neon);
                    text-shadow: 0 0 20px rgba(0,212,255,0.5), 0 0 40px rgba(0,212,255,0.2);
                }

                #main {
                    flex: 1;
                    margin-left: var(--sidebar-w);
                    padding: 20px;
                    min-height: calc(100vh - 60px);
                }

                #results-bar {
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    margin-bottom: 16px;
                    flex-wrap: wrap;
                    gap: 8px;
                }

                    font-size: 0.8rem;

                        border: 1px solid rgba(0,212,255,0.2);
                        color: var(--neon);
                    }
